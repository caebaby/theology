  { id:"luther", category:"reformer", name:"Luther", era:"1483–1546 AD", region:"Germany",
    tagline:"Here I stand — I can do no other. God help me. Amen.",
    badge:"REFORMER",
    scriptures:[
      { ref:"Rom 1:17", text:"'For in it the righteousness of God is revealed from faith for faith, as it is written, The righteous shall live by faith.' — The verse that broke him open and launched the Reformation." },
      { ref:"Gal 1:8", text:"'But even if we or an angel from heaven should preach to you a gospel contrary to the one we preached to you, let him be accursed.'" },
      { ref:"Eph 2:8–9", text:"'For by grace you have been saved through faith. And this is not your own doing; it is the gift of God, not a result of works, so that no one may boast.'" },
      { ref:"Rom 8:1", text:"'There is therefore now no condemnation for those who are in Christ Jesus.'" },
      { ref:"John 8:36", text:"'So if the Son sets you free, you will be free indeed.'" },
    ],
    front:"Augustinian monk terrified of a holy God. Struck by lightning at 21 — vowed to become a monk. Years of confession, fasting, terror — never finding peace. Romans 1:17 broke open: 'the righteousness of God' is his gift, not his demand. October 31, 1517: 95 Theses. Printing press spread them across Europe in weeks.",
    back:"Translated the NT into German in 11 weeks hiding at Wartburg Castle. Married former nun Katherine von Bora to embody Protestant freedom. Called On the Bondage of the Will his most important book. Augustinian friar who recovered Augustine. Pauline scholar who recovered Paul.",
    writings:[
      { title:"95 Theses (1517)", desc:"The spark. Attack on the selling of indulgences. Spread virally by the new printing press." },
      { title:"On the Bondage of the Will (1525)", desc:"Against Erasmus. The enslaved will. Grace alone. Luther's own favorite — 'all my other books are less than dust beside it.'" },
      { title:"The Freedom of a Christian (1520)", desc:"'A Christian is a perfectly free lord of all, subject to none. A perfectly dutiful servant of all, subject to all.' The paradox of grace." },
      { title:"Small Catechism (1529)", desc:"Theology for families: Ten Commandments, Creed, Lord's Prayer. Still used today." },
    ],
    connections:["Philip Melanchthon — colleague who systematized Lutheran theology","John Calvin — next generation who built on Luther's foundation","Lutheran Church worldwide — 80 million"],
    modernEcho:"Every Protestant church exists because of Luther. His recovery of justification by faith alone is the hinge of church history after 325 AD." },

  { id:"calvin", category:"reformer", name:"Calvin", era:"1509–1564 AD", region:"Geneva",
    tagline:"Soli Deo Gloria — the greatest systematic theologian of the Reformation.",
    badge:"REFORMER",
    scriptures:[
      { ref:"Rom 11:36", text:"'For from him and through him and to him are all things. To him be glory forever. Amen.' — Calvin's entire theology in one verse." },
      { ref:"Rom 9:15–16", text:"'For he says to Moses, I will have mercy on whom I have mercy… So then it depends not on human will or exertion, but on God, who has mercy.'" },
      { ref:"Eph 1:4–5", text:"'…even as he chose us in him before the foundation of the world, that we should be holy and blameless before him. In love he predestined us for adoption.'" },
    ],
    front:"French lawyer, not a trained theologian. Converted around 1533. Stopped in Geneva for 'one night' in 1536 — William Farel threatened him with God's curse if he left. Stayed 28 years. Preached through every book of the Bible. Never raised his voice in the pulpit. Wept openly.",
    back:"His Institutes (first edition at age 26) is the most important systematic theology of the Reformation. Wrote commentaries on almost every book of the Bible — still considered the best Reformation-era biblical commentary. His five points (TULIP) are the most debated doctrinal package in Protestantism.",
    writings:[
      { title:"Institutes of the Christian Religion (1536/1559)", desc:"Four books: knowledge of God, knowledge of man, grace in Christ, the church. Still assigned in Reformed seminaries." },
      { title:"Commentaries on the Bible (all but Revelation)", desc:"Accessible, clear, scholarly. The best Reformation-era biblical commentary." },
    ],
    connections:["John Knox — Scottish disciple who brought Calvinism to Scotland","Westminster Assembly (1643–1649) — produced the Westminster Confession","Tim Keller, John Piper, R.C. Sproul — modern Calvinists"],
    modernEcho:"Reformed/Presbyterian theology is Calvinism. The Westminster Confession (1646) is its high-water mark. Tim Keller's Redeemer Presbyterian, John Piper's Bethlehem Baptist — all directly Calvinist." },

  { id:"wesley", category:"reformer", name:"Wesley", era:"1703–1791 AD", region:"England",
    tagline:"The world is my parish — set the people on fire.",
    badge:"REVIVALIST",
    scriptures:[
      { ref:"Phil 2:12–13", text:"'Work out your own salvation with fear and trembling, for it is God who works in you, both to will and to work for his good pleasure.' — The Wesley paradox: human effort and divine grace together." },
      { ref:"2 Cor 3:18", text:"'And we all, with unveiled face, beholding the glory of the Lord, are being transformed into the same image from one degree of glory to another.'" },
      { ref:"Rom 5:5", text:"'…God's love has been poured into our hearts through the Holy Spirit who has been given to us.'" },
      { ref:"1 John 4:18", text:"'There is no fear in love, but perfect love casts out fear.' — His doctrine of entire sanctification aimed at this." },
    ],
    front:"Oxford 'Holy Club' founder. Went to Georgia as a missionary — failed completely. Returned humiliated. May 24, 1738: Aldersgate Street. Someone read Luther's preface to Romans. 'I felt my heart strangely warmed. I felt I did trust in Christ, Christ alone for salvation.' Everything changed. He preached 40,000 sermons, traveled 250,000 miles on horseback.",
    back:"His theological inheritance: read Macarius the Great (4th-century desert father) and built his doctrine of entire sanctification on that 1,400-year-old foundation. Methodism became the most successful evangelical revival movement in English-speaking history. The Salvation Army, holiness movement, and Pentecostalism all trace to Wesley.",
    writings:[
      { title:"A Plain Account of Christian Perfection (1766)", desc:"His clearest statement of entire sanctification — the 'second work of grace' purifying the heart's disposition toward God." },
      { title:"Sermons on Several Occasions (4 vols.)", desc:"His doctrinal standard sermons. 'The Scripture Way of Salvation' is the most important." },
      { title:"Journal (1735–1790)", desc:"55 years of daily diary. One of the great spiritual journals in English." },
    ],
    connections:["George Whitefield — fellow Holy Club member; parted over Calvinist vs. Arminian theology; reconciled at death","Charles Wesley — brother; wrote 6,000+ hymns including 'And Can It Be'","Francis Asbury — sent Wesley's movement to America; rode 300,000 miles"],
    modernEcho:"350 million Methodists, holiness, and Pentecostal Christians worldwide trace to Wesley. His Aldersgate moment is the template for evangelical conversion experience." },

  // ══════════════════ FALSE TEACHERS ══════════════════
  { id:"arius", category:"false", name:"Arius", era:"256–336 AD", region:"Alexandria",
    tagline:"'There was a time when He was not' — the most dangerous Christological error.",
    badge:"CONDEMNED: NICAEA 325 AD",
    scriptures:[
      { ref:"John 1:1", text:"'In the beginning was the Word, and the Word was with God, and the Word was God.' — Arius tried to argue 'the Word was a god' (a lesser god)." },
      { ref:"Col 1:16–17", text:"'For by him all things were created… and in him all things hold together.' — Cannot apply to a creature." },
      { ref:"Heb 1:8", text:"'But of the Son he says, Your throne, O God, is forever and ever.' — The Father calls the Son 'God.'" },
      { ref:"John 20:28", text:"'Thomas answered him, My Lord and my God!' — Direct address of Jesus as God by an apostle." },
    ],
    front:"Presbyter in Alexandria. Brilliant and charismatic. Put his theology to music — people sang Arianism in the streets. Taught the Son is the highest created being, not co-eternal with the Father: 'There was a time when He was not.' Had massive imperial backing. Athanasius stood alone for decades against the world.",
    back:"His error seems to protect monotheism. But Athanasius saw the fatal flaw: if Christ is not truly God, the atonement is insufficient. Only God can forgive sins against God. Only God can give eternal life. A highest-creature redeemer is still a creature — and no creature can bear the sins of the world.",
    writings:[
      { title:"Thalia ('The Banquet')", desc:"Theological poetry and music spreading Arianism through Alexandria. Brilliant propaganda. Survives only in Athanasius's refutation." },
    ],
    modernDescendants:["Jehovah's Witnesses — Jesus is Michael the Archangel, 'a god' not Almighty God","Mormonism — Jesus is a separate exalted being; Godhead not Trinity","Unitarianism — God is one person; Jesus a supreme moral teacher","Liberal Protestant Christology — Jesus as the most God-conscious human who ever lived"],
    modernNames:["Jehovah's Witnesses — their New World Translation renders John 1:1 as 'a god'","John Shelby Spong (d. 2021) — denied Christ's ontological divinity in his 12 Theses","Marcus Borg — Jesus as 'spirit person,' not ontologically divine","Bart Ehrman — most-read NT scholar publicly rejecting Christ's divinity"],
    coreError:"Makes Christ less than fully God. A demi-god redeemer cannot forgive sins against the infinite God or give eternal life. The atonement and resurrection become the work of a creature, not the Creator." },

  { id:"pelagius", category:"false", name:"Pelagius", era:"360–418 AD", region:"Britain / Rome",
    tagline:"'If I ought, I can' — the heresy that flatters human dignity.",
    badge:"CONDEMNED: CARTHAGE 418 AD",
    scriptures:[
      { ref:"Rom 3:10–11", text:"'None is righteous, no, not one; no one understands; no one seeks for God.' — Paul's indictment Pelagius could not account for." },
      { ref:"John 6:44", text:"'No one can come to me unless the Father who sent me draws him.' — The 'cannot' destroys the Pelagian 'can.'" },
      { ref:"Eph 2:1", text:"'And you were dead in the trespasses and sins.' — Dead people do not take first steps." },
      { ref:"Jer 17:9", text:"'The heart is deceitful above all things, and desperately sick; who can understand it?'" },
    ],
    front:"British monk respected in Rome for moral seriousness. Appalled by Christians using grace as an excuse for lax living. Denied original sin's corruption of the will. 'If God commands it, I can do it.' Humans can choose good without divine grace. Salvation begins with human initiative.",
    back:"Augustine's reply: Pelagius's God is essentially unnecessary for the start of salvation. If humans take the first step, grace becomes coaching not rescue — and we have grounds for boasting (which Rom 3:27 excludes). A dead man cannot choose to breathe. He needs to be raised first.",
    writings:[
      { title:"On Nature", desc:"Defended natural human capacity to avoid sin. Augustine wrote 'On Nature and Grace' as point-by-point refutation." },
    ],
    modernDescendants:["Prosperity Gospel — your faith + giving + confession = God's obligation to bless","Moralistic Therapeutic Deism — be good and God will accept you","'Decision theology' — salvation as primarily your choice, without prior regenerating grace","Self-help Christianity — spiritual growth as human effort with divine assistance"],
    modernNames:["Joel Osteen — 'You have seeds of greatness inside you. Your best life now'","Kenneth Copeland — seed-faith, name-it-claim-it; your faith obligates God's response","Steven Furtick — elevation theology, declarations, human potential emphasis"],
    coreError:"Divides the glory of redemption between God and man. Paul says boasting is excluded entirely (Rom 3:27; 1 Cor 1:29–31). If I took the first step, I have grounds to boast — which means I get some of the glory that belongs to God alone." },

  { id:"marcion", category:"false", name:"Marcion", era:"85–160 AD", region:"Rome",
    tagline:"Rejected the God of Israel — the most pastorally destructive heresy.",
    badge:"CONDEMNED: ~144 AD",
    scriptures:[
      { ref:"Matt 5:17", text:"'Do not think that I have come to abolish the Law or the Prophets; I have not come to abolish them but to fulfill them.' — Jesus himself refutes Marcion." },
      { ref:"John 5:39", text:"'You search the Scriptures because you think that in them you have eternal life; and it is they that bear witness about me.' — Jesus says the OT is about him." },
      { ref:"Luke 24:27", text:"'And beginning with Moses and all the Prophets, he interpreted to them in all the Scriptures the things concerning himself.'" },
      { ref:"Heb 1:1–2", text:"'Long ago, at many times and in many ways, God spoke to our fathers by the prophets, but in these last days he has spoken to us by his Son.' — Same God, progressive revelation." },
    ],
    front:"Wealthy shipowner who came to Rome with a large donation. Taught the OT God (violent, judgmental, Jewish) is a different, lesser creator-god from the loving Father of Jesus. Created his own truncated canon: mutilated Luke + 10 Pauline letters, with all OT references excised.",
    back:"His movement functioned as a parallel church for generations. Tertullian wrote 5 volumes against him. The irony: his truncated canon forced the orthodox church to formally define the real canon in response. His error — that wrath and love, OT and NT are opposites — makes Jesus's own Bible irrelevant.",
    writings:[
      { title:"Antitheses", desc:"Contrasted OT against NT passages to 'prove' two different Gods. Survives only in Tertullian's massive five-volume refutation." },
    ],
    modernDescendants:["Progressive Christianity — 'The God of the OT is not my God'","'Red Letter' reductionism — only Jesus's words matter; Paul is optional","Functional rejection of divine wrath and judgment as incompatible with love"],
    modernNames:["Rob Bell (Love Wins) — hell incompatible with a loving God","Richard Rohr — OT God as 'inferior revelation'; universal salvation","Brian McLaren — reframes atonement away from penal substitution"],
    coreError:"Severs Christianity from its Jewish roots and makes Jesus's own Bible irrelevant. Produces a God of pure sentiment with no justice — which is not the God Jesus worshipped, quoted, and obeyed." },

  { id:"valentinus", category:"false", name:"Valentinus", era:"100–160 AD", region:"Alexandria / Rome",
    tagline:"Salvation by secret knowledge — the most sophisticated Gnostic system.",
    badge:"CONDEMNED: EARLY CHURCH",
    scriptures:[
      { ref:"Col 2:8", text:"'See to it that no one takes you captive by philosophy and empty deceit, according to human tradition, according to the elemental spirits of the world, and not according to Christ.'" },
      { ref:"Col 2:9", text:"'For in him the whole fullness of deity dwells bodily.' — Against every Gnostic denial of the full Incarnation." },
      { ref:"1 John 4:2", text:"'Every spirit that confesses that Jesus Christ has come in the flesh is from God.' — The test Valentinus fails." },
    ],
    front:"Alexandrian-educated, nearly became Bishop of Rome. His was the most sophisticated Gnostic system: a divine 'Pleroma' (fullness) of 30 spiritual emanations. Material creation was a cosmic mistake by a lower god. The physical world is evil. Christ brought the secret knowledge (gnosis) that spiritual people need to escape matter.",
    back:"His system appealed to educated, spiritually-sophisticated people — the ancient equivalent of today's 'spiritual but not religious' platform. It combined Jesus with cosmic spirituality, dismissed the God of the OT, made salvation about hidden knowledge, and treated the physical world as beneath spiritual people. Irenaeus spent his career refuting it.",
    writings:[
      { title:"Gospel of Truth (possibly Valentinus)", desc:"Found at Nag Hammadi (1945). Meditation on Gnostic themes using NT language. Shows how Gnosticism hijacks Christian vocabulary." },
    ],
    modernDescendants:["New Age spirituality — divine spark within, evolution of consciousness","Oprah's 'New Earth' teaching with Eckhart Tolle","Deepak Chopra — quantum spirituality, Christ as cosmic consciousness","Marianne Williamson — A Course in Miracles"],
    modernNames:["Oprah Winfrey & Eckhart Tolle — A New Earth: awakening to divine consciousness within","Deepak Chopra — Christ as 'the light of the universe,' not historical Savior","Marianne Williamson — A Course in Miracles reinterprets the NT in Gnostic terms"],
    coreError:"Separates the spiritual from the physical. A Christ who did not really take on flesh cannot really redeem flesh. A salvation that escapes the body cannot account for the resurrection. The Incarnation — God in a body — is the whole point." },

  { id:"montanus", category:"false", name:"Montanus", era:"fl. 170 AD", region:"Phrygia",
    tagline:"New prophecy that superseded scripture — the original 'fresh word' movement.",
    badge:"CONDEMNED: LATE 2ND CENTURY",
    scriptures:[
      { ref:"Jude 3", text:"'…contend for the faith that was once for all delivered to the saints.' — 'Once for all' closes the deposit." },
      { ref:"Rev 22:18–19", text:"'I warn everyone who hears the words of the prophecy of this book: if anyone adds to them, God will add to him the plagues described in this book.'" },
      { ref:"1 Cor 14:29", text:"'Let two or three prophets speak, and let the others weigh what is said.' — Paul's test: prophecy is tested, not automatically authoritative." },
      { ref:"1 John 4:1", text:"'Beloved, do not believe every spirit, but test the spirits to see whether they are from God, for many false prophets have gone out into the world.'" },
    ],
    front:"Former pagan priest converted to Christianity. Began prophesying in ecstatic trances alongside two prophetesses (Prisca and Maximilla), claiming the Holy Spirit was speaking directly through them. Announced the New Jerusalem would descend in Phrygia. Called his movement the 'New Prophecy.' Claimed his revelations were superior to the NT.",
    back:"His movement attracted Tertullian — the greatest theological mind of the Latin West — who eventually left the church for Montanism. The controversy forced the early church to articulate why the apostolic deposit was closed. His error: not that he believed in the Holy Spirit, but that he placed new revelation above and beyond scripture.",
    writings:[
      { title:"Montanus's Oracles", desc:"Survive only in quotations by opponents. Characteristic style: 'I am the Father, the Son, and the Paraclete' — claiming direct divine speech, not merely inspired prophecy." },
    ],
    modernDescendants:["New Apostolic Reformation (NAR) — apostles and prophets with current authority equal to or beyond scripture","'Fresh word' movements — ongoing revelation through designated prophets","Any movement where a leader's word is placed above congregational discernment or scripture"],
    modernNames:["Bill Johnson (Bethel Church) — continuationist theology drifting toward extra-biblical revelation","Dutch Sheets — prophetic declarations over nations","Todd Bentley — Lakeland Revival (2008); unchecked prophetic authority"],
    coreError:"The Holy Spirit does not give new revelation that supersedes scripture. He illuminates what is written (John 16:13–15 — 'he will take what is mine and declare it to you'). The issue is authority: does the new word judge scripture or does scripture judge the new word?" },

  { id:"sabellius", category:"false", name:"Sabellius", era:"fl. 215 AD", region:"Rome / Libya",
    tagline:"One God in three masks — modalism collapses the Trinity.",
    badge:"CONDEMNED: ~220 AD",
    scriptures:[
      { ref:"Matt 3:16–17", text:"'The heavens were opened to him, and he saw the Spirit of God descending like a dove and coming to rest on him; and behold, a voice from heaven said, This is my beloved Son, with whom I am well pleased.' — Father, Son, Spirit simultaneously." },
      { ref:"John 17:1", text:"'When Jesus had spoken these words, he lifted up his eyes to heaven, and said, Father, the hour has come; glorify your Son.' — Jesus prays to the Father — not to himself." },
      { ref:"Heb 7:25", text:"'He always lives to make intercession for them.' — Christ intercedes with the Father — two distinct persons in ongoing relation." },
    ],
    front:"Little is known personally, but his teaching became the clearest formulation of Modalism: Father, Son, and Holy Spirit are not three distinct persons but three successive roles or 'modes' that the one God wears. Like one actor playing three parts. Condemned by Pope Callixtus.",
    back:"Sabellianism seems to protect monotheism and sounds simpler than the Trinity. But it collapses the cross: if the Father is the Son, then the Father was crucified — and no one was there to hear Christ's cry 'My God, my God, why have you forsaken me?' And it collapses prayer: Jesus praying to the Father becomes soliloquy.",
    writings:[
      { title:"No surviving writings", desc:"Known entirely through refutations by Hippolytus and Tertullian (Against Praxeas). Tertullian coined the term 'Trinity' (Trinitas) partly in response to modalist teachers." },
    ],
    modernDescendants:["Oneness Pentecostalism (UPCI) — 'Jesus Only'; Father, Son, Spirit are all the same person","Any teaching that collapses the persons: 'Jesus is his own Father'"],
    modernNames:["United Pentecostal Church International (UPCI) — denies the Trinity; baptism 'in Jesus name only'","T.D. Jakes (historically) — used Oneness Pentecostal language; has since moderated","Paul Crouch (TBN founder) — expressed modalist sentiments in recorded statements"],
    coreError:"If the Father and Son are the same person, the atonement is theater: God pretended to forsake himself on the cross. Real propitiation requires real distinction — the Son bearing the Father's just judgment against sin. 'My God, my God, why have you forsaken me?' requires two persons for those words to mean anything." },

  // ══════════════════ DOCTRINE CARDS ══════════════════
  { id:"trinity", category:"doctrine", name:"The Trinity", era:"Eternal / Nicaea 325 AD",
    tagline:"One God in three persons — the heartbeat of all theology.", badge:"THEOLOGY PROPER", symbol:"△",
    definition:"One God eternally existing as three distinct co-equal, co-eternal persons — Father, Son, and Holy Spirit — each fully God, sharing one divine essence (οὐσία, ousia), distinct in personhood (ὑπόστασις, hypostasis). The Son is eternally generated (γεννηθέντα, gennēthenta) from the Father; the Spirit eternally proceeds (ἐκπορευόμενον, ekporeuomenon). The three mutually indwell each other (περιχώρησις, perichoresis). Not three Gods (Τριθεΐσμός, Tritheism). Not one God in three masks (Μοδαλισμός, Modalism). Three persons, one Being.",
    whyItMatters:"The Trinity is not a theological puzzle — it is the eternal reality that God is love. Love requires an other. The Father loved the Son before the world existed (John 17:24). Salvation is Trinitarian: the Father sends, the Son redeems, the Spirit applies. Deny the Trinity and salvation collapses.",
    scriptures:[
      { ref:"Matt 28:19", text:"'Go therefore and make disciples of all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit.'" },
      { ref:"John 17:5", text:"'And now, Father, glorify me in your own presence with the glory that I had with you before the world existed.'" },
      { ref:"2 Cor 13:14", text:"'The grace of the Lord Jesus Christ and the love of God and the fellowship of the Holy Spirit be with you all.'" },
      { ref:"John 10:30", text:"'I and the Father are one.'" },
      { ref:"John 14:26", text:"'But the Helper, the Holy Spirit, whom the Father will send in my name, he will teach you all things.'" },
      { ref:"Gen 1:26", text:"'Then God said, Let us make man in our image, after our likeness.' — The plural points toward intra-Trinitarian communion." },
    ],
    keyTexts:["Athanasius — Against the Arians","Augustine — On the Trinity","Nicene Creed (325/381 AD)","Cappadocians — οὐσία (ousia), three ὑποστάσεις (hypostases)"],
    views:[
      { name:"Nicene Orthodoxy — THE STANDARD", color:"#2a6a3a", position:"One essence (οὐσία, ousia), three co-equal co-eternal persons (ὑποστάσεις, hypostases). Father generates the Son eternally; Spirit proceeds from Father (East) or Father and Son — the Filioque — καὶ τοῦ Υἱοῦ (West).", counter:null },
      { name:"Arianism — CONDEMNED Nicaea 325 AD", color:"#8a1414", position:"The Son is the highest created being, 'like' the Father but not the same substance. 'There was a time when He was not.' Still alive in Jehovah's Witnesses and Mormonism.", counter:"Heb 1:3 — 'the exact imprint of his nature.' John 1:1 — 'the Word WAS God.' Col 1:16-17 — 'by him all things were created' — cannot apply to a creature. Athanasius: only a truly divine Savior can truly save." },
      { name:"Modalism / Sabellianism — CONDEMNED 3rd c.", color:"#8a1414", position:"Father, Son, Spirit are not distinct persons but three roles or masks of one God worn sequentially. Alive in Oneness Pentecostalism (UPCI).", counter:"At Jesus's baptism: the Son is baptized, the Father speaks from heaven, the Spirit descends as a dove — simultaneously. Three things at once. Jesus prays to the Father (John 17) — if they are the same person, prayer is soliloquy." },
      { name:"Social Trinitarianism — OVERCORRECTION", color:"#6a5010", position:"Three persons so distinct they are almost three Gods who share a common divine nature. Risks Tritheism.", counter:"The NT insists on monotheism (Deut 6:4; 1 Cor 8:6). Three centers of consciousness who 'share' divine nature approaches three Gods, not one God in three persons." },
    ],
    errorToAvoid:"'God in three modes' collapses the cross into God punishing himself theatrically. 'Three Gods' destroys monotheism. The Nicene formula — one essence, three persons — is precise because the stakes are infinite." },

  { id:"incarnation", category:"doctrine", name:"The Incarnation", era:"~4 BC / Chalcedon 451 AD",
    tagline:"The eternal Word became flesh — the hinge of everything.", badge:"CHRISTOLOGY", symbol:"✦",
    definition:"The eternal Son of God (ὁ Λόγος, ho Logos) took on a full human nature — body, soul, mind, will — while remaining fully divine. Two complete natures (φύσεις, physeis) in one person (ὑπόστασις, hypostasis) — the hypostatic union (ἡ ὑποστατικὴ ἕνωσις, hē hypostatikē henōsis). 'Without confusion, without change, without division, without separation' (Chalcedon, 451 AD). The attributes of each nature are genuinely communicated to the one person (communicatio idiomatum). Not a divine spirit in a human shell. Not a human elevated to divine status. God became genuinely, fully human.",
    whyItMatters:"If Christ is not fully human, he cannot represent us. If he is not fully God, he cannot save us. Athanasius: 'He became what we are so that we might become what he is.' Both natures must be complete or the rescue fails.",
    scriptures:[
      { ref:"John 1:14", text:"'And the Word became flesh and dwelt among us, and we have seen his glory, glory as of the only Son from the Father, full of grace and truth.'" },
      { ref:"Phil 2:6–8", text:"'…who, though he was in the form of God, did not count equality with God a thing to be grasped, but emptied himself, by taking the form of a servant, being born in the likeness of men.'" },
      { ref:"Heb 2:17", text:"'Therefore he had to be made like his brothers in every respect, so that he might become a merciful and faithful high priest in the service of God, to make propitiation for the sins of the people.'" },
      { ref:"Heb 4:15", text:"'For we do not have a high priest who is unable to sympathize with our weaknesses, but one who in every respect has been tempted as we are, yet without sin.'" },
      { ref:"Col 1:19", text:"'For in him all the fullness of God was pleased to dwell.'" },
      { ref:"1 John 4:2", text:"'Every spirit that confesses that Jesus Christ has come in the flesh is from God.'" },
    ],
    keyTexts:["Athanasius — On the Incarnation (start here)","Council of Chalcedon (451 AD)","Anselm — Cur Deus Homo","Irenaeus — Against Heresies Book V"],
    views:[
      { name:"Chalcedonian Orthodoxy — THE STANDARD", color:"#2a5a8a", position:"Two natures (divine + human), one person. 'Without confusion, without change, without division, without separation.' The Son is fully God and fully man. Accepted by Catholic, Orthodox, and Protestant churches since 451 AD.", counter:null },
      { name:"Docetism — CONDEMNED 1st–2nd c.", color:"#8a1414", position:"Christ only appeared (Greek: dokeo) to be human. His body was an illusion. God could not take on corrupt matter.", counter:"Luke 24:39 — 'a spirit does not have flesh and bones as you see that I have.' John 20:27 — Thomas touches the wounds. 1 John 4:2 — confessing Jesus came 'in the flesh' is the test of God's Spirit." },
      { name:"Nestorianism — CONDEMNED Ephesus 431", color:"#8a1414", position:"Two natures but two distinct persons loosely united. Mary is mother of the human Christ (Χριστοτόκος (Christotokos)) but not of God (Θεοτόκος (Theotokos)).", counter:"Col 2:9 — 'in him the whole fullness of deity dwells bodily.' One person with two natures — not two persons. If two persons, who died on the cross?" },
      { name:"Monophysitism — CONDEMNED Chalcedon 451", color:"#6a5010", position:"One nature — the human was absorbed into the divine. Held by Coptic, Ethiopian, and Armenian churches (who prefer 'Miaphysitism').", counter:"Heb 2:17 — he 'had to be made like his brothers in every respect.' Heb 4:15 — he sympathizes with our weaknesses. If his humanity was absorbed, he cannot be our representative high priest." },
    ],
    errorToAvoid:"Both natures must be real and complete. A Jesus who was 'mostly human' or 'mostly God' is the wrong Jesus — and the wrong Jesus cannot save. The Chalcedonian formula is precise because the salvation it protects is infinite in consequence." },

  { id:"justification", category:"doctrine", name:"Justification", era:"Romans 3–5 / Reformation 1517",
    tagline:"Declared righteous — the article on which the church stands or falls.", badge:"SOTERIOLOGY", symbol:"⚖",
    definition:"Justification (δικαίωσις, dikaiōsis) is God's forensic (legal) declaration that a sinner is righteous in his sight — not because of moral improvement but because of Christ's righteousness credited (imputed, λογίζομαι, logizomai) to their account, received through faith alone (sola fide, πίστει μόνῃ). It is a verdict (δικαίωμα, dikaiōma), not a process. The great exchange (2 Cor 5:21): our sin to Christ's account, his righteousness (δικαιοσύνη, dikaiosynē) to ours. Complete at the moment of faith.",
    whyItMatters:"Luther: 'The article by which the church stands or falls.' If justification is a process of moral improvement, no one can know they're saved. If it is a complete declaration based on Christ's finished work, assurance is possible and all glory goes to God.",
    scriptures:[
      { ref:"Rom 3:28", text:"'For we hold that one is justified by faith apart from works of the law.'" },
      { ref:"Rom 4:5", text:"'And to the one who does not work but believes in him who justifies the ungodly, his faith is counted as righteousness.'" },
      { ref:"Rom 5:1", text:"'Therefore, since we have been justified by faith, we have peace with God through our Lord Jesus Christ.'" },
      { ref:"Gal 2:16", text:"'…we know that a person is not justified by works of the law but through faith in Jesus Christ.'" },
      { ref:"2 Cor 5:21", text:"'For our sake he made him to be sin who knew no sin, so that in him we might become the righteousness of God.' — The great exchange." },
      { ref:"Rom 8:1", text:"'There is therefore now no condemnation for those who are in Christ Jesus.'" },
    ],
    keyTexts:["Luther — Commentary on Galatians","Calvin — Institutes III.11–18","R.C. Sproul — Faith Alone","Council of Trent Session 6 (1547) — read the opposing position"],
    views:[
      { name:"Protestant Forensic Justification — REFORMATION POSITION", color:"#7a5a10", position:"God declares the sinner righteous by imputing (crediting) Christ's righteousness to his account. Received by faith alone. Complete and irrevocable at the moment of faith.", counter:null },
      { name:"Roman Catholic — Infused Righteousness", color:"#6a5010", position:"Justification is a process of inner transformation by infused grace, progressing through the sacraments, completed at final judgment. Faith formed by love (fides caritate formata) required. Council of Trent (1547) explicitly condemned sola fide.", counter:"Paul says justification happens at the moment of faith (Rom 5:1). Abraham 'believed God and it was counted to him as righteousness' (Rom 4:3) — before circumcision, before the law. If justification includes moral transformation, assurance becomes impossible." },
      { name:"New Perspective on Paul (N.T. Wright)", color:"#6a5010", position:"Justification is primarily about covenant membership — who belongs to the people of God — not individual guilt/forgiveness. 'Works of the law' means Jewish identity markers, not moral works generally.", counter:"Paul's argument in Romans 3–5 is universal: 'all have sinned' (3:23), Abraham's faith was counted as righteousness before any identity markers (4:9–12). The judicial language ('ungodly,' 'condemned,' 'verdict') requires a forensic reading." },
      { name:"Federal Vision — WIDELY CONDEMNED", color:"#8a1414", position:"Justification includes a works element — 'faithfulness' rather than 'faith alone.' Condemned by multiple Reformed bodies.", counter:"Gal 2:16 — 'not by works of law but through faith in Jesus Christ.' The moment works enter the basis of justification, boasting enters — which Rom 3:27 excludes." },
    ],
    errorToAvoid:"Don't confuse justification (declared righteous — verdict, past tense, complete) with sanctification (becoming righteous — process, ongoing). Mix them and you get legalism or antinomianism." },

  { id:"atonement", category:"doctrine", name:"The Atonement", era:"The Cross, ~30 AD",
    tagline:"What exactly happened on the cross — and why does it matter?", badge:"SOTERIOLOGY", symbol:"†",
    definition:"What God accomplished through the death of Christ to reconcile sinners to himself. The NT uses multiple images: substitution — ἀντίλυτρον (antilytron), he died in our place; propitiation — ἱλαστήριον (hilastērion), he satisfied divine wrath; redemption — ἀπολύτρωσις (apolytrōsis), he bought us out of slavery to sin; reconciliation — καταλλαγή (katallagē), he restored the broken relationship; victory — Christus Victor over sin, death, and the devil (Col 2:15).",
    whyItMatters:"What you believe happened on the cross determines what the Gospel is. A therapeutic cross (Christ showing us how to live) produces a different Christianity than a substitutionary cross (Christ bearing the penalty we deserved). The stakes are eternal.",
    scriptures:[
      { ref:"2 Cor 5:21", text:"'For our sake he made him to be sin who knew no sin, so that in him we might become the righteousness of God.'" },
      { ref:"Rom 3:25", text:"'…whom God put forward as a propitiation by his blood, to be received by faith.' — Propitiation: the wrath of God satisfied." },
      { ref:"Isa 53:5–6", text:"'But he was pierced for our transgressions; he was crushed for our iniquities… and the Lord has laid on him the iniquity of us all.'" },
      { ref:"Mark 10:45", text:"'For even the Son of Man came not to be served but to serve, and to give his life as a ransom for many.'" },
      { ref:"1 Pet 2:24", text:"'He himself bore our sins in his body on the tree, that we might die to sin and live to righteousness. By his wounds you have been healed.'" },
      { ref:"Heb 9:22", text:"'Without the shedding of blood there is no forgiveness of sins.'" },
    ],
    keyTexts:["John Stott — The Cross of Christ (essential)","Anselm — Cur Deus Homo","Leon Morris — The Apostolic Preaching of the Cross","Athanasius — On the Incarnation"],
    views:[
      { name:"Penal Substitution — DOMINANT REFORMED/EVANGELICAL", color:"#7a5a10", position:"Christ bore the legal penalty (wrath of God) owed by sinners, in their place. God's justice is satisfied. The believer is declared righteous. Luther, Calvin, Owen, Stott.", counter:null },
      { name:"Christus Victor — EASTERN ORTHODOX / EARLY CHURCH", color:"#2a5a8a", position:"Christ's death and resurrection defeated the cosmic powers of sin, death, and the devil. Emphasis on victory over bondage. Strong in Irenaeus, Athanasius, Eastern Orthodoxy.", counter:"Does not adequately explain propitiation language (Rom 3:25; 1 John 2:2 — ἱλασμός (hilasmos) means wrath-satisfying). Best read as complementary to substitution, not a replacement." },
      { name:"Moral Influence — Abelard / Liberal Protestantism", color:"#8a1414", position:"The cross demonstrates God's love and inspires us to live differently. No actual transaction with divine justice. The basis of liberal Protestant soteriology.", counter:"1 Pet 2:24 — 'he bore our sins.' Rom 3:25 — 'propitiation.' Isa 53:5 — 'pierced for our transgressions.' The NT language is consistently transactional. If the cross is only inspiration, why was it necessary?" },
      { name:"Governmental Theory — Hugo Grotius / Arminian", color:"#6a5010", position:"God as moral governor accepts Christ's suffering as sufficient demonstration that sin is serious, without strict substitution.", counter:"Rom 3:26 — God is 'just AND the justifier.' His justice is not relaxed — it is satisfied. Heb 9:22 — 'without the shedding of blood there is no forgiveness.' The 'must' of the cross implies necessity, not moral theater." },
    ],
    errorToAvoid:"Two ditches: (1) Flatten the cross to one theory — use all the biblical images. (2) Avoid the hard one: propitiation. Someone bore the wrath of God. The Gospel is not just 'God loves you' — it is 'God was just in forgiving you.'" },

  { id:"resurrection", category:"doctrine", name:"The Resurrection", era:"~30 AD / 1 Cor 15",
    tagline:"If Christ has not been raised, your faith is futile — 1 Cor 15:17.", badge:"CORE DOCTRINE", symbol:"☩",
    definition:"Jesus Christ physically and bodily rose from the dead on the third day — the same body that was buried, transformed and glorified, but materially continuous. The Greek ἀνάστασις (anastasis) means standing up again — a bodily rising, not a spiritual survival. His resurrection body was σῶμα πνευματικόν (sōma pneumatikon, 1 Cor 15:44) — spiritual in the sense of Spirit-animated, not immaterial. The empty tomb was empty. He ate fish. Thomas touched his wounds. The firstfruits (ἀπαρχή, aparchē) of the general resurrection to come.",
    whyItMatters:"Paul stakes everything on it: 'If Christ has not been raised, your faith is futile and you are still in your sins.' Remove it and you have inspiring teachings — but not salvation, not forgiveness, not eternal life. The Christian faith is a response to a historical event.",
    scriptures:[
      { ref:"1 Cor 15:3–6", text:"'…that Christ died for our sins in accordance with the Scriptures, that he was buried, that he was raised on the third day… he appeared to more than five hundred brothers at one time, most of whom are still alive.'" },
      { ref:"1 Cor 15:17", text:"'And if Christ has not been raised, your faith is futile and you are still in your sins.'" },
      { ref:"Luke 24:39", text:"'See my hands and my feet, that it is I myself. Touch me, and see. For a spirit does not have flesh and bones as you see that I have.'" },
      { ref:"John 20:27–28", text:"'Put your finger here, and see my hands… Thomas answered him, My Lord and my God!'" },
      { ref:"Rom 4:25", text:"'…who was delivered up for our trespasses and raised for our justification.'" },
      { ref:"Rom 8:11", text:"'If the Spirit of him who raised Jesus from the dead dwells in you, he who raised Christ Jesus from the dead will also give life to your mortal bodies.'" },
    ],
    keyTexts:["N.T. Wright — The Resurrection of the Son of God (definitive)","Gary Habermas & Michael Licona — The Case for the Resurrection (accessible)","William Lane Craig — Reasonable Faith (philosophical)"],
    views:[
      { name:"Physical/Bodily Resurrection — ORTHODOX POSITION", color:"#7a5a10", position:"The same body that died rose — transformed but materially continuous. Empty tomb. Appearances. Touch. Food. 500 simultaneous witnesses. Held by Catholic, Orthodox, and Protestant Christianity.", counter:null },
      { name:"Spiritual Resurrection — Gnostic / Progressive", color:"#8a1414", position:"Jesus's spirit survived death. The 'resurrection' is spiritual, not physical. Popular in some progressive Christian circles.", counter:"Luke 24:39 — 'a spirit does not have flesh and bones as you see that I have.' John 20:27 — Thomas touches the wounds. Acts 2:31 — his flesh 'did not see corruption.' The entire NT uses bodily resurrection language." },
      { name:"Hallucination / Grief Vision Theory", color:"#8a1414", position:"The disciples had grief-induced visions. Accounts for appearance narratives without an empty tomb.", counter:"1 Cor 15:6 — 500 people simultaneously. Group hallucinations are not documented in psychology. The empty tomb (confirmed by opponents who claimed the body was stolen, not denied) is unexplained." },
      { name:"Metaphorical / Existential Resurrection", color:"#6a5010", position:"The resurrection describes a change in the disciples' perspective — 'Jesus lives on in our hearts.' Found in liberal and Bultmannian theology.", counter:"Paul's argument in 1 Cor 15:12–19 only works as logical proof if resurrection is a physical event. You cannot falsify a metaphor — but Paul's argument has a falsifiable structure: 'if the dead are not raised, then…'" },
    ],
    errorToAvoid:"The resurrection is not a metaphor for new beginnings. Paul's entire argument in 1 Corinthians 15 requires a physical, historical event. Strip it of that and the Gospel — forgiveness, eternal life, future resurrection — evaporates with it." },

  { id:"scripture", category:"doctrine", name:"Scripture", era:"Ongoing / 2 Tim 3:16",
    tagline:"God-breathed and sufficient — the foundation all theology stands on.", badge:"BIBLIOLOGY", symbol:"||",
    definition:"Scripture is the written Word of God, given by divine inspiration — θεόπνευστος (theopneustos, 'God-breathed,' 2 Tim 3:16). The biblical authors were moved by the Holy Spirit (φερόμενοι ὑπὸ πνεύματος ἁγίου, pheromenoi hypo pneumatos hagiou, 2 Pet 1:21) — carried along, not dictated to. The result is inerrant in the original manuscripts (αὐτόγραφα, autographa) and sufficient (αὐτάρκης, autarkēs) for all matters of faith and life. Supreme authority above tradition, reason, and experience — sola scriptura.",
    whyItMatters:"Your view of scripture determines everything else. If scripture is fully trustworthy, it rules. If it contains errors, you become the judge of which parts to trust — and you have replaced scripture with yourself. Every major departure from orthodox Christianity in the last 200 years began with lowering the authority of scripture.",
    scriptures:[
      { ref:"2 Tim 3:16–17", text:"'All Scripture is breathed out by God and profitable for teaching, for reproof, for correction, and for training in righteousness, that the man of God may be complete, equipped for every good work.'" },
      { ref:"2 Pet 1:20–21", text:"'No prophecy of Scripture comes from someone's own interpretation. For no prophecy was ever produced by the will of man, but men spoke from God as they were carried along by the Holy Spirit.'" },
      { ref:"Ps 119:105", text:"'Your word is a lamp to my feet and a light to my path.'" },
      { ref:"John 17:17", text:"'Sanctify them in the truth; your word is truth.'" },
      { ref:"Heb 4:12", text:"'For the word of God is living and active, sharper than any two-edged sword, piercing to the division of soul and of spirit… and discerning the thoughts and intentions of the heart.'" },
      { ref:"Isa 40:8", text:"'The grass withers, the flower fades, but the word of our God will stand forever.'" },
      { ref:"Matt 4:4", text:"'Man shall not live by bread alone, but by every word that comes from the mouth of God.'" },
    ],
    keyTexts:["B.B. Warfield — The Inspiration and Authority of the Bible","Chicago Statement on Biblical Inerrancy (1978)","John Frame — The Doctrine of the Word of God","Kevin Vanhoozer — Is There Meaning in This Text?"],
    views:[
      { name:"Full Inerrancy — EVANGELICAL STANDARD", color:"#2a5a8a", position:"Scripture is without error in all that it affirms — theological, historical, and wherever it speaks. The Chicago Statement (1978) is the definitive articulation.", counter:null },
      { name:"Limited Inerrancy / Infallibility", color:"#6a5010", position:"Scripture is inerrant in matters of faith and salvation but may contain errors in history, geography, or science. The Bible's purpose is soteriological, not encyclopedic.", counter:"2 Tim 3:16 — 'all Scripture is breathed out by God' — not just the theological parts. Jesus treated historical OT narratives (Jonah, Noah, Adam) as straightforwardly factual. If we pick which parts to trust, we replace scripture's authority with our own judgment." },
      { name:"Neo-Orthodox (Karl Barth)", color:"#6a5010", position:"Scripture becomes the Word of God in the event of a Spirit-led encounter. The Bible is a human witness to divine revelation; it contains errors but can become authoritative.", counter:"'Becomes' makes authority subjective. Paul says scripture IS breathed out by God (past tense, objective). The Word does not become true when I encounter it; it is true, and I encounter the true Word." },
      { name:"Liberal — Human Record of Religious Experience", color:"#8a1414", position:"Scripture is the record of Israel's religious experience. It contains timeless wisdom but also ancient errors, myth, and cultural conditioning.", counter:"Jesus said 'your word is truth' (John 17:17), not 'contains truth.' He quoted the OT as settling arguments ('it is written'). The NT argument that Christ fulfills OT prophecy requires that the OT was actually saying those things." },
    ],
    errorToAvoid:"Two ditches: (1) Bibliolatry — treating the text as magical rather than as the means of meeting the living God. (2) Epistemic cowardice — refusing to affirm inerrancy because it's culturally unpopular, while your entire theological framework depends on it. Jerome: 'Ignorance of Scripture is ignorance of Christ.'" },

  { id:"sanctification", category:"doctrine", name:"Sanctification", era:"Romans 6–8 / Ongoing",
    tagline:"Becoming what you already are in Christ — the lifelong work of the Spirit.", badge:"SOTERIOLOGY", symbol:"✶",
    definition:"Sanctification (ἁγιασμός, hagiasmos) is the progressive transformation of the believer into the likeness of Christ (εἰκὼν τοῦ Χριστοῦ, eikōn tou Christou) by the Holy Spirit, through the Word, prayer, community, and suffering. Distinct from justification: justification is instantaneous and declarative (δικαίωσις); sanctification is ongoing and transformative. The Spirit puts sin to death (νέκρωσις, nekrōsis, Rom 8:13) and produces his fruit (καρπός, karpos, Gal 5:22–23). Both fully God's work and requiring genuine human cooperation.",
    whyItMatters:"Without sanctification, justification becomes a license for sin. Without justification, sanctification becomes the basis of acceptance with God. The two must be kept distinct and inseparable — like heat and light from the same flame. John Owen: 'Be killing sin or it will be killing you.'",
    scriptures:[
      { ref:"Rom 6:11–12", text:"'So you also must consider yourselves dead to sin and alive to God in Christ Jesus. Let not sin therefore reign in your mortal body.'" },
      { ref:"Phil 2:12–13", text:"'Work out your own salvation with fear and trembling, for it is God who works in you, both to will and to work for his good pleasure.' — Both human effort and divine power." },
      { ref:"2 Cor 3:18", text:"'And we all, with unveiled face, beholding the glory of the Lord, are being transformed into the same image from one degree of glory to another. For this comes from the Lord who is the Spirit.'" },
      { ref:"Heb 12:14", text:"'Strive for peace with everyone, and for the holiness without which no one will see the Lord.'" },
      { ref:"1 Thess 4:3", text:"'For this is the will of God, your sanctification.'" },
      { ref:"1 Pet 1:15–16", text:"'But as he who called you is holy, you also be holy in all your conduct, since it is written, You shall be holy, for I am holy.'" },
    ],
    keyTexts:["John Owen — Mortification of Sin","Jerry Bridges — The Pursuit of Holiness","John Wesley — A Plain Account of Christian Perfection","Sinclair Ferguson — The Holy Spirit"],
    views:[
      { name:"Reformed / Progressive — MAJORITY EVANGELICAL", color:"#7a5a10", position:"Lifelong, progressive, never complete in this life. God works through the means of grace (Word, prayer, community, suffering). Human effort and divine power cooperate.", counter:null },
      { name:"Wesleyan Entire Sanctification", color:"#6a4010", position:"A 'second work of grace' — a crisis of consecration in which the Spirit cleanses the heart's fundamental orientation from sinful self-love to pure love of God. Not sinless perfection but a purified heart.", counter:"Reformed response: Scripture describes ongoing warfare with sin even in mature believers (Rom 7; Gal 5:17; 1 John 1:8). The language of 'entire' may overstate what is possible before glorification. But Wesleyans rightly emphasize that transformation should be dramatic, not merely incremental." },
      { name:"Eastern Orthodox — Theosis (Deification)", color:"#2a5a8a", position:"Participation in the divine nature (2 Pet 1:4). Becoming by grace what God is by nature — sharing in divine life, light, and love. The goal of salvation is not just forgiveness but transformation into the divine likeness.", counter:"Protestant concern: language of 'deification' can obscure the Creator-creature distinction. But theosis need not mean identity with God. Athanasius's 'became what we are so we might become what he is' is theotic language within orthodoxy." },
      { name:"Keswick / 'Let Go and Let God'", color:"#8a1414", position:"Sanctification is passive — surrender fully and God does the work. The believer ceases striving and rests in Christ's life flowing through them.", counter:"Phil 2:12 — 'work out your salvation.' Heb 12:14 — 'strive for holiness.' Rom 6:12 — 'let not sin therefore reign.' The NT consistently calls believers to active, strenuous effort — Spirit-empowered, yes, but never passive." },
    ],
    errorToAvoid:"Two errors: (1) Sanctification as basis of acceptance — 'I must become good enough for God.' That is works-righteousness. (2) Separating them — 'I'm justified, so growth doesn't matter.' That is antinomianism. They are distinct, inseparable, and ordered: justification grounds sanctification; it does not replace it." },

  { id:"grace_faith", category:"doctrine", name:"Grace & Faith", era:"Eph 2:8–9 / Reformation",
    tagline:"Sola Gratia, Sola Fide — the twin pillars the Reformation stood on.", badge:"SOTERIOLOGY", symbol:"†",

function App() {
  const [tab, setTab] = useState("cards");
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [cardIndex, setCardIndex] = useState(null);
  const [flipped, setFlipped] = useState(false);
  const [viewed, setViewed] = useState(() => {
    try { return JSON.parse(localStorage.getItem("kyc_v") || "[]"); } catch { return []; }
  });

  const filtered = CARDS.filter(c =>
    (filter === "all" || c.category === filter) &&
    (!search || c.name.toLowerCase().includes(search.toLowerCase()) || c.tagline.toLowerCase().includes(search.toLowerCase()))
  );

  const openCard = (idx) => {
    setCardIndex(idx);
    setFlipped(false);
    const id = filtered[idx]?.id;
    if (id && !viewed.includes(id)) {
      const next = [...viewed, id];
      setViewed(next);
      try { localStorage.setItem("kyc_v", JSON.stringify(next)); } catch {}
    }
  };

  const nav = useCallback((dir) => {
    if (cardIndex === null) return;
    const next = cardIndex + dir;
    if (next >= 0 && next < filtered.length) { setCardIndex(next); setFlipped(false); }
  }, [cardIndex, filtered.length]);

  useEffect(() => {
    const handler = (e) => {
      if (cardIndex === null) return;
      if (e.key === "ArrowRight") nav(1);
      if (e.key === "ArrowLeft") nav(-1);
      if (e.key === "f" || e.key === "F") setFlipped(f => !f);
      if (e.key === "Escape") setCardIndex(null);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [nav, cardIndex]);

  const pct = Math.round(viewed.length / CARDS.length * 100);
  const current = cardIndex !== null ? filtered[cardIndex] : null;

  const TABS = [
    ["cards","📇","Cards"], ["daily","📅","Daily 7"], ["creeds","📜","Creeds"],
    ["bibtheo","🌿","Bib Theo"], ["greek","α","Greek"], ["heresy","🕸","Heresy Tree"],
    ["timeline","📅","Timeline"], ["herm","🔍","Hermeneutics"], ["apol","🛡","Apologetics"],
    ["systheo","🗺","Sys Theo"], ["christo","✟","Christology"], ["cov","📖","Cov/Disp"],
    ["eschaton","🌅","Eschatology"], ["survey","📔","Bible Survey"], ["denoms","🌲","Denoms"], ["disciplines","🕊","Disciplines"], ["quiz","🎯","Quiz"],
    ["resources","🎧","Resources"], ["reading","📚","Reading"],
  ];

  return (
    <div style={{ minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'Inter',sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap');
        * { box-sizing:border-box }
        ::-webkit-scrollbar { width:5px }
        ::-webkit-scrollbar-thumb { background:#c0b090; border-radius:3px }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .ci:hover { transform:translateY(-3px) scale(1.015) !important; cursor:pointer }
        .ci { transition:all 0.18s ease !important }
        .tab-scroll::-webkit-scrollbar { height:3px }
      `}</style>

      {/* Header */}
      <div style={{ background:"#e8dcc8", borderBottom:`1px solid ${T.border}`, padding:"10px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", position:"sticky", top:0, zIndex:50 }}>
        <div>
          <div style={{ fontFamily:"'Raleway',sans-serif", fontSize:"15px", fontWeight:"900", color:T.gold, letterSpacing:"0.04em" }}>Know Your Church</div>
          <div style={{ fontSize:"9px", color:T.textMuted, letterSpacing:"0.08em" }}>{viewed.length}/{CARDS.length} cards studied · {pct}%</div>
        </div>
        <div style={{ width:"80px", height:"4px", background:T.border, borderRadius:"2px" }}>
          <div style={{ height:"100%", width:`${pct}%`, background:T.gold, borderRadius:"2px", transition:"width 0.5s" }}/>
        </div>
      </div>

      {/* Tab bar — horizontally scrollable */}
      <div className="tab-scroll" style={{ background:"#e8dcc8", borderBottom:`1px solid ${T.border}`, overflowX:"auto", whiteSpace:"nowrap", padding:"6px 12px", display:"flex", gap:"6px" }}>
        {TABS.map(([k,icon,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{
            background: tab===k ? T.gold : "transparent",
            border: `1px solid ${tab===k ? T.gold : T.border}`,
            color: tab===k ? "#fff" : T.textMuted,
            padding:"5px 12px", borderRadius:"16px", cursor:"pointer", flexShrink:0,
            fontFamily:"'Raleway',sans-serif", fontSize:"10px", letterSpacing:"0.05em",
            transition:"all 0.18s", fontWeight: tab===k ? "700" : "400",
          }}>{icon} {label}</button>
        ))}
      </div>

      <div style={{ padding:"14px 16px", maxWidth:"980px", margin:"0 auto" }}>

        {tab==="cards" && (
          <>
            <div style={{ maxWidth:"280px", margin:"0 auto 12px" }}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search cards..."
                style={{ width:"100%", background:T.parchment, border:`1px solid ${T.border}`, color:T.text, padding:"7px 14px", borderRadius:"20px", fontSize:"13px", outline:"none", fontFamily:"sans-serif" }}/>
            </div>
            <div style={{ display:"flex", gap:"6px", justifyContent:"center", flexWrap:"wrap", marginBottom:"16px" }}>
              <FilterBtn label="All" active={filter==="all"} color={T.gold} onClick={()=>setFilter("all")} count={CARDS.length}/>
              {Object.entries(CATS).map(([k,{label,color}])=>(
                <FilterBtn key={k} label={label} active={filter===k} color={color} onClick={()=>setFilter(k)} count={CARDS.filter(c=>c.category===k).length}/>
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))", gap:"12px" }}>
              {filtered.map((c,i)=>(
                <MiniCard key={c.id} card={c} index={i} onClick={()=>openCard(i)} seen={viewed.includes(c.id)}/>
              ))}
            </div>
          </>
        )}

        {tab==="daily"    && <DailyView viewed={viewed} setViewed={setViewed}/>}
        {tab==="creeds"   && <CreedsView/>}
        {tab==="bibtheo"  && <BibTheoView/>}
        {tab==="greek"    && <GreekView/>}
        {tab==="heresy"   && <HeresyTreeView/>}
        {tab==="timeline" && <TimelineView/>}
        {tab==="herm"     && <HermeneuticsView/>}
        {tab==="apol"     && <ApologeticsView/>}
        {tab==="resources"&& <ResourcesView/>}
        {tab==="reading"   && <ReadingView/>}
        {tab==="systheo"  && <SysTheoView/>}
        {tab==="christo"  && <ChristoMapView/>}
        {tab==="cov"      && <CovDispView/>}
        {tab==="eschaton" && <EschatonView/>}
        {tab==="survey"   && <BibleSurveyView/>}
        {tab==="denoms"   && <DenomsView/>}
        {tab==="disciplines" && <DisciplinesView/>}
        {tab==="quiz"     && <QuizView/>}
      </div>

      {/* Card Modal */}
      {current && (
        <div onClick={()=>setCardIndex(null)} style={{ position:"fixed", inset:0, background:"rgba(60,40,10,0.7)", zIndex:100, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"12px" }}>
          <div onClick={e=>e.stopPropagation()} style={{ width:"100%", maxWidth:"500px", display:"flex", flexDirection:"column", gap:"10px" }}>
            <div style={{ display:"flex", justifyContent:"center", gap:"4px", flexWrap:"wrap" }}>
              {filtered.map((_,i)=>(
                <div key={i} onClick={()=>openCard(i)} style={{ width:i===cardIndex?"16px":"6px", height:"6px", borderRadius:"3px", cursor:"pointer", background:i===cardIndex?T.gold:T.border, transition:"all 0.2s" }}/>
              ))}
            </div>
            <FullCard card={current} flipped={flipped} setFlipped={setFlipped}/>
            <div style={{ display:"flex", gap:"8px", justifyContent:"center", alignItems:"center" }}>
              <NavBtn onClick={()=>nav(-1)} disabled={cardIndex===0} label="←"/>
              <ActionBtn onClick={()=>setFlipped(!flipped)} label={flipped?"← Front":"Flip ↩"} primary/>
              <ActionBtn onClick={()=>setCardIndex(null)} label="Close"/>
              <NavBtn onClick={()=>nav(1)} disabled={cardIndex===filtered.length-1} label="→"/>
            </div>
            <div style={{ textAlign:"center", fontSize:"10px", color:"#d4c4a0", fontFamily:"'Raleway',sans-serif", letterSpacing:"0.08em" }}>
              {cardIndex+1} / {filtered.length} · arrow keys · F to flip · Esc to close
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── GREEK GLOSSARY VIEW ─────────────────────────────────────────────────────
function GreekView() {
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("all");
  const [open, setOpen] = useState(null);
  const cats = ["all", ...Array.from(new Set(GREEK.map(g=>g.cat)))];
  const filtered = GREEK.filter(g =>
    (cat==="all" || g.cat===cat) &&
    (!search || g.word.toLowerCase().includes(search.toLowerCase()) || g.def.toLowerCase().includes(search.toLowerCase()))
  );
  const catColors = { "Christology":"#5a3a8a","Theology Proper":"#2a5a8a","Soteriology":"#7a3010","Atonement":"#8a1414","Anthropology":"#6a4010","Pneumatology":"#2a5a8a","Eschatology":"#2a6a3a","Ecclesiology":"#3a5a3a","Bibliology":"#7a5a10" };
  return (
    <div>
      <SH label="GREEK GLOSSARY — 25 KEY TERMS" color={T.gold}/>
      <p style={{ fontSize:"12px", color:T.textSub, lineHeight:1.7, marginBottom:12, fontFamily:"'Inter',sans-serif" }}>
        You don't need to learn Greek to read theology — but knowing these 25 words will unlock the NT, clarify debates, and let you read scholars directly. These are the terms serious theological conversation turns on.
      </p>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search terms..."
        style={{ width:"100%", background:T.parchment, border:`1px solid ${T.border}`, color:T.text, padding:"7px 14px", borderRadius:"20px", fontSize:"13px", outline:"none", fontFamily:"sans-serif", marginBottom:10 }}/>
      <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:14 }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{
            background: cat===c ? (catColors[c]||T.gold) : "transparent",
            border:`1px solid ${catColors[c]||T.gold}`,
            color: cat===c ? "#fff" : (catColors[c]||T.gold),
            padding:"4px 10px", borderRadius:"12px", cursor:"pointer",
            fontFamily:"'Raleway',sans-serif", fontSize:"9px", letterSpacing:"0.05em",
          }}>{c}</button>
        ))}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {filtered.map((g,i)=>{
          const cc = catColors[g.cat]||T.gold;
          return (
            <div key={i} onClick={()=>setOpen(open===i?null:i)} style={{
              background: open===i ? `${cc}10` : T.card,
              border:`1px solid ${cc}${open===i?"":"44"}`,

// ─── QUIZ VIEW ────────────────────────────────────────────────────────────────
function QuizView() {
  const ALL_Q = [
    ...GREEK.map(g=>({ q:`What does ${g.word} mean?`, a:`${g.roman} — ${g.def.split("—")[1]?.trim().split(".")[0] || g.def.split(".")[0]}`, cat:"Greek" })),
    ...CREEDS.map(c=>c.text.slice(0,5).map(t=>({ q:`Complete: "${t.line.substring(0,30)}…"`, a:t.note, cat:"Creeds" }))).flat(),
    { q:"What are the 4 Chalcedonian boundaries?", a:"Without confusion · Without change · Without division · Without separation", cat:"Christology" },
    { q:"What does ὁμοούσιος (homoousios) mean and why does it matter?", a:"'Of the same substance' — the battle word of Nicaea. The Son is identical in essence to the Father, not merely similar. Athanasius was exiled 5 times defending it.", cat:"Christology" },
    { q:"Name the 3 main Magisterial Reformers and their contributions.", a:"Luther (justification by faith, Scripture alone, Germany) · Zwingli (Reformed theology, Zurich) · Calvin (sovereignty of grace, church order, Geneva). Knox brought Reformed theology to Scotland.", cat:"History" },
    { q:"What is the ordo salutis?", a:"The order of salvation: calling → regeneration → faith → justification → adoption → sanctification → glorification", cat:"Soteriology" },
    { q:"What are the 4 classical views of the millennium?", a:"Amillennialism (present church age) · Historic Premil (Christ returns before literal mil) · Dispensational Premil (pretrib rapture + literal mil) · Postmillennialism (gospel triumph before Christ returns)", cat:"Eschatology" },
    { q:"What is the Filioque controversy?", a:"Does the Holy Spirit proceed from the Father alone (Eastern) or from the Father and the Son (Western)? This clause split East and West in the Great Schism of 1054.", cat:"Theology" },
    { q:"What are the 5 Reformation solas?", a:"Sola Scriptura · Sola Gratia · Sola Fide · Solus Christus · Soli Deo Gloria", cat:"Reformation" },
    { q:"What is the proto-evangelium and where is it?", a:"Genesis 3:15 — the first gospel promise embedded in the curse: 'He shall bruise your head, and you shall bruise his heel.' The seed of the woman will defeat the serpent.", cat:"Biblical Theology" },
    { q:"Distinguish justification from sanctification.", a:"Justification: the one-time legal declaration of righteousness received by faith (past). Sanctification: the ongoing process of being made holy by the Spirit (present). Distinct but inseparable.", cat:"Soteriology" },
    { q:"What is Arianism and who defeated it?", a:"Arianism: Christ is the highest created being ('there was a time when he was not'). Defeated by Athanasius at Nicaea (325 AD) with the term ὁμοούσιος (homoousios).", cat:"History" },
    { q:"What are the 8 loci of systematic theology?", a:"Prolegomena · Theology Proper · Anthropology · Christology · Pneumatology · Soteriology · Ecclesiology · Eschatology", cat:"Systematic" },
  ];

  const [deck] = useState(()=>[...ALL_Q].sort(()=>Math.random()-0.5));
  const [idx, setIdx] = useState(0);
  const [shown, setShown] = useState(false);
  const [score, setScore] = useState({ right:0, wrong:0 });
  const [catFilter, setCatFilter] = useState("all");
  const cats = ["all", ...Array.from(new Set(ALL_Q.map(q=>q.cat)))];
  const filtered = catFilter==="all" ? deck : deck.filter(q=>q.cat===catFilter);
  const cur = filtered[idx % Math.max(filtered.length,1)];

  const answer = (correct) => {
    setScore(s=>({...s, [correct?"right":"wrong"]: s[correct?"right":"wrong"]+1}));
    setIdx(i=>i+1); setShown(false);
  };

  if (!cur) return <div style={{ textAlign:"center", padding:40, fontFamily:"'Inter',sans-serif", color:T.textMuted }}>No questions in this category.</div>;

  const total = score.right + score.wrong;
  return (
    <div>
      <SH label="QUIZ MODE" color={T.gold}/>
      <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:12 }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>{setCatFilter(c);setIdx(0);setShown(false);}} style={{
            background: catFilter===c?T.gold:"transparent", border:`1px solid ${T.gold}`,
            color: catFilter===c?"#fff":T.gold, padding:"4px 10px", borderRadius:"12px",
            cursor:"pointer", fontFamily:"'Raleway',sans-serif", fontSize:"9px", letterSpacing:"0.04em",
          }}>{c}</button>
        ))}
      </div>
      {total > 0 && (
        <div style={{ display:"flex", gap:16, marginBottom:12, padding:"8px 14px", background:T.card, borderRadius:8, border:`1px solid ${T.border}`, justifyContent:"center" }}>
          <span style={{ fontFamily:"'Raleway',sans-serif", fontSize:"11px", color:"#2a6a3a" }}>✓ {score.right} correct</span>
          <span style={{ fontFamily:"'Raleway',sans-serif", fontSize:"11px", color:"#8a1414" }}>✗ {score.wrong} incorrect</span>
          <span style={{ fontFamily:"'Raleway',sans-serif", fontSize:"11px", color:T.gold }}>{Math.round(score.right/total*100)}%</span>
        </div>
      )}
      <div style={{ background:T.card, border:`1.5px solid ${T.gold}`, borderRadius:12, padding:"20px 18px", marginBottom:12, minHeight:120, display:"flex", flexDirection:"column", justifyContent:"center" }}>
        <div style={{ fontSize:"9px", color:T.gold, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.08em", marginBottom:8 }}>{cur.cat} · QUESTION {(idx%filtered.length)+1}/{filtered.length}</div>
        <p style={{ fontFamily:"'Inter',sans-serif", fontSize:"16px", color:T.text, lineHeight:1.7, margin:0 }}>{cur.q}</p>
      </div>
      {!shown ? (
        <div style={{ textAlign:"center" }}>
          <ActionBtn onClick={()=>setShown(true)} label="Reveal Answer" primary/>
        </div>
      ) : (
        <>
          <div style={{ background:`${T.gold}10`, border:`1px solid ${T.gold}55`, borderRadius:10, padding:"14px 16px", marginBottom:12 }}>
            <div style={{ fontSize:"9px", color:T.gold, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.08em", marginBottom:6 }}>ANSWER</div>
            <p style={{ fontFamily:"'Inter',sans-serif", fontSize:"14px", color:T.text, lineHeight:1.75, margin:0 }}>{cur.a}</p>
          </div>
          <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
            <button onClick={()=>answer(false)} style={{ background:"#8a1414", border:"none", color:"#fff", padding:"9px 24px", borderRadius:"20px", cursor:"pointer", fontFamily:"'Raleway',sans-serif", fontSize:"11px", fontWeight:"700" }}>✗ Missed it</button>
            <button onClick={()=>answer(true)} style={{ background:"#2a6a3a", border:"none", color:"#fff", padding:"9px 24px", borderRadius:"20px", cursor:"pointer", fontFamily:"'Raleway',sans-serif", fontSize:"11px", fontWeight:"700" }}>✓ Got it</button>
          </div>
        </>
      )}
    </div>
  );
}
