      animation:`fadeUp 0.26s ease ${Math.min(index*0.025,0.35)}s both`,
    }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:"2px", background:`linear-gradient(90deg,transparent,${cat.color}88,transparent)` }}/>
      {seen && <div style={{ position:"absolute", top:8, right:8, width:"5px", height:"5px", borderRadius:"50%", background:cat.color }}/>}

      {isDoctrine ? (
        <div style={{ height:72, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:10 }}>
          <div style={{ fontSize:34, color:cat.color, fontFamily:"sans-serif", opacity:0.7 }}>{card.symbol}</div>
        </div>
      ) : (
        <div style={{ display:"flex", justifyContent:"center", marginBottom:8 }}>
          <StainedGlass id={card.id} size={70}/>
        </div>
      )}

      <div style={{ fontSize:"9px", color:cat.color, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.1em", marginBottom:3, textAlign:"center" }}>{card.badge}</div>
      <div style={{ fontFamily:"'Raleway',sans-serif", fontSize:"13px", fontWeight:"700", color:T.text, textAlign:"center", lineHeight:1.2, marginBottom:3 }}>{card.name}</div>
      <div style={{ fontSize:"9px", color:`${cat.color}99`, textAlign:"center", marginBottom:5 }}>{card.era}</div>
      <div style={{ fontSize:"10px", color:T.textMuted, lineHeight:1.5, textAlign:"center", fontStyle:"italic" }}>"{card.tagline.slice(0,52)}{card.tagline.length>52?"…":""}"</div>
    </div>
  );
}

// ─── FULL CARD ────────────────────────────────────────────────────────────────
function FullCard({ card, flipped, setFlipped }) {
  const cat = CATS[card.category] || CATS.doctrine;
  const isFalse = card.category === "false";
  const isDoctrine = card.category === "doctrine";
  const cc = cat.color;

  return (
    <div style={{
      background:T.card,
      border:`2px solid ${cc}55`,
      borderRadius:"16px", padding:"18px",
      position:"relative", overflow:"hidden",
      maxHeight:"72vh", overflowY:"auto",
      boxShadow:`0 8px 40px ${T.shadow}`,
    }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:"3px", background:`linear-gradient(90deg,transparent,${cc},transparent)` }}/>

      {/* Header */}
      <div style={{ display:"flex", gap:"12px", alignItems:"flex-start", marginBottom:"12px" }}>
        {isDoctrine
          ? <div style={{ width:76, height:76, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:10, background:`${cc}11`, border:`1.5px solid ${cc}44`, fontSize:32, flexShrink:0, color:cc, fontFamily:"sans-serif" }}>{card.symbol}</div>
          : <div style={{ flexShrink:0, borderRadius:6, overflow:"hidden", border:`1.5px solid ${cc}44`, boxShadow:`0 2px 12px ${T.shadow}` }}><StainedGlass id={card.id} size={72}/></div>
        }
        <div style={{ flex:1 }}>
          <div style={{ fontSize:"9px", color:cc, letterSpacing:"0.12em", fontFamily:"'Raleway',sans-serif", marginBottom:3 }}>{card.badge}</div>
          <div style={{ fontFamily:"'Raleway',sans-serif", fontSize:"17px", fontWeight:"900", color:T.text, lineHeight:1.1, marginBottom:3 }}>{card.name}</div>
          <div style={{ fontSize:"10px", color:`${cc}99`, marginBottom:6 }}>{card.era}{card.region?` · ${card.region}`:""}</div>
          <div style={{ fontSize:"11px", color:T.textSub, fontStyle:"italic", lineHeight:1.5 }}>"{card.tagline}"</div>
        </div>
      </div>

      {/* Side toggle */}
      <div style={{ display:"flex", gap:"6px", marginBottom:"12px" }}>
        {["FRONT","BACK"].map(side=>(
          <button key={side} onClick={()=>setFlipped(side==="BACK")} style={{
            flex:1,
            background:(!flipped&&side==="FRONT")||(flipped&&side==="BACK")?`${cc}18`:"transparent",
            border:`1px solid ${(!flipped&&side==="FRONT")||(flipped&&side==="BACK")?cc:T.border}`,
            color:(!flipped&&side==="FRONT")||(flipped&&side==="BACK")?cc:T.textMuted,
            borderRadius:"6px", padding:"5px", cursor:"pointer",
            fontFamily:"'Raleway',sans-serif", fontSize:"10px", letterSpacing:"0.08em", transition:"all 0.2s"
          }}>{side}</button>
        ))}
      </div>

      <div key={String(flipped)}>
        {!flipped ? (
          // ── FRONT ──
          <div>
            {isDoctrine ? (
              <>
                <SH label="DEFINITION" color={cc}/>
                <p style={{ fontSize:"13px", color:T.textSub, lineHeight:1.8, margin:"0 0 10px", fontFamily:"'Inter',sans-serif" }}>{card.definition}</p>
                <SH label="WHY IT MATTERS" color={cc}/>
                <p style={{ fontSize:"13px", color:T.textMuted, lineHeight:1.75, margin:"0 0 12px", fontFamily:"'Inter',sans-serif" }}>{card.whyItMatters}</p>
              </>
            ) : (
              <>
                <p style={{ fontSize:"13px", color:T.textSub, lineHeight:1.8, margin:"0 0 10px", fontFamily:"'Inter',sans-serif" }}>{card.front}</p>
                <p style={{ fontSize:"13px", color:T.textMuted, lineHeight:1.75, margin:"0 0 12px", fontFamily:"'Inter',sans-serif", borderTop:`1px solid ${cc}22`, paddingTop:10 }}>{card.back}</p>
                {card.writings && card.writings.length > 0 && (
                  <>
                    <SH label={isFalse?"THEIR WRITINGS (in context)":"WRITINGS & WORKS"} color={isFalse?T.red:cc}/>
                    {card.writings.map((w,i)=>(
                      <div key={i} style={{ marginBottom:8, background:T.surface, borderRadius:6, padding:"8px 12px", borderLeft:`3px solid ${isFalse?T.red:cc}44` }}>
                        <div style={{ fontSize:"11px", fontWeight:"600", color:isFalse?T.red:cc, fontFamily:"'Raleway',sans-serif", marginBottom:2 }}>{w.title}</div>
                        <div style={{ fontSize:"12px", color:T.textMuted, lineHeight:1.55, fontFamily:"'Inter',sans-serif" }}>{w.desc}</div>
                      </div>
                    ))}
                  </>
                )}
              </>
            )}
            <SH label="SCRIPTURE ANCHORS" color={cc}/>
            {card.scriptures.map((s,i)=>(
              <div key={i} style={{ marginBottom:10, background:i===0?`${cc}0d`:T.surface, borderRadius:6, padding:"8px 12px", borderLeft:`3px solid ${cc}${i===0?"99":"44"}` }}>
                <div style={{ fontSize:"11px", fontWeight:"700", color:cc, fontFamily:"'Raleway',sans-serif", marginBottom:3, letterSpacing:"0.04em" }}>{s.ref}</div>
                <div style={{ fontSize:"12px", color:T.textSub, lineHeight:1.6, fontStyle:"italic", fontFamily:"'Inter',sans-serif" }}>{s.text}</div>
              </div>
            ))}
          </div>
        ) : (
          // ── BACK ──
          <div>
            {isDoctrine ? (
              <>
                <SH label="VIEWS & THE DEBATE" color={cc}/>
                {card.views.map((v,i)=>(
                  <div key={i} style={{ marginBottom:12, background:T.surface, borderRadius:8, padding:"10px 14px", borderLeft:`3px solid ${v.color}${i===0?"cc":"66"}`, border:`1px solid ${v.color}${i===0?"33":"18"}` }}>
                    <div style={{ fontSize:"11px", fontWeight:"700", color:v.color, fontFamily:"'Raleway',sans-serif", marginBottom:4 }}>{v.name}</div>
                    <div style={{ fontSize:"12px", color:T.textSub, lineHeight:1.6, fontFamily:"'Inter',sans-serif" }}>{v.position}</div>
                    {v.counter && (
                      <div style={{ marginTop:8, padding:"6px 10px", background:`${cc}0d`, borderRadius:4, borderLeft:`2px solid ${cc}88` }}>
                        <div style={{ fontSize:"9px", color:cc, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.1em", marginBottom:3 }}>ORTHODOX COUNTER</div>
                        <div style={{ fontSize:"12px", color:T.textMuted, lineHeight:1.55, fontFamily:"'Inter',sans-serif" }}>{v.counter}</div>
                      </div>
                    )}
                  </div>
                ))}
                <div style={{ padding:"10px 14px", background:`${T.gold}0d`, borderRadius:6, borderLeft:`3px solid ${T.gold}55`, marginTop:4 }}>
                  <div style={{ fontSize:"9px", color:T.gold, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.1em", marginBottom:4 }}>WATCH OUT FOR</div>
                  <div style={{ fontSize:"12px", color:T.textMuted, lineHeight:1.65, fontFamily:"'Inter',sans-serif" }}>{card.errorToAvoid}</div>
                </div>
              </>
            ) : isFalse ? (
              <>
                <SH label="MODERN DESCENDANTS" color={T.red}/>
                {card.modernDescendants.map((d,i)=>(
                  <div key={i} style={{ display:"flex", gap:8, marginBottom:6, fontSize:"12px", color:T.textSub, lineHeight:1.5, fontFamily:"'Inter',sans-serif" }}>
                    <span style={{ color:T.red, flexShrink:0 }}>›</span>{d}
                  </div>
                ))}
                <SH label="NAMED MODERN VOICES" color={T.red}/>
                {card.modernNames.map((n,i)=>(
                  <div key={i} style={{ display:"flex", gap:8, marginBottom:6, fontSize:"12px", color:T.textSub, lineHeight:1.5, fontFamily:"'Inter',sans-serif" }}>
                    <span style={{ color:`${T.red}88`, flexShrink:0 }}>⚑</span>{n}
                  </div>
                ))}
                <div style={{ marginTop:12, padding:"10px 14px", background:"#f5e8e8", borderRadius:6, borderLeft:`3px solid ${T.red}66` }}>
                  <div style={{ fontSize:"9px", color:T.red, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.1em", marginBottom:4 }}>THE CORE ERROR</div>
                  <div style={{ fontSize:"12px", color:T.textMuted, lineHeight:1.65, fontFamily:"'Inter',sans-serif" }}>{card.coreError}</div>
                </div>
              </>
            ) : (
              <>
                <SH label="CONNECTIONS" color={cc}/>
                {card.connections.map((c,i)=>(
                  <div key={i} style={{ display:"flex", gap:8, marginBottom:6, fontSize:"12px", color:T.textSub, fontFamily:"'Inter',sans-serif" }}>
                    <span style={{ color:`${cc}88` }}>→</span>{c}
                  </div>
                ))}
                {card.modernEcho && (
                  <div style={{ marginTop:14, padding:"12px 14px", background:`${cc}0d`, borderRadius:6, borderLeft:`3px solid ${cc}55` }}>
                    <div style={{ fontSize:"9px", color:cc, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.1em", marginBottom:5 }}>MODERN ECHO</div>
                    <div style={{ fontSize:"13px", color:T.textSub, lineHeight:1.68, fontFamily:"'Inter',sans-serif" }}>{card.modernEcho}</div>
                  </div>
                )}
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── DAILY VIEW ───────────────────────────────────────────────────────────────
function DailyView({ viewed, setViewed }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const day = Math.floor(Date.now() / 86400000);
  const daily = [...CARDS].sort((a,b) => {
    const ha = Math.sin(day*9301+CARDS.indexOf(a)*49297)*1e5;
    const hb = Math.sin(day*9301+CARDS.indexOf(b)*49297)*1e5;
    return ha-hb;
  }).slice(0,7);
  const card = daily[idx];
  return (
    <div style={{ maxWidth:"500px", margin:"0 auto" }}>
      <div style={{ textAlign:"center", marginBottom:12 }}>
        <div style={{ fontSize:"10px", color:`${T.gold}99`, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.15em" }}>TODAY'S STUDY DECK — {idx+1} of {daily.length}</div>
      </div>
      <FullCard card={card} flipped={flipped} setFlipped={setFlipped}/>
      <div style={{ display:"flex", gap:8, justifyContent:"center", marginTop:12 }}>
        <NavBtn onClick={()=>{setIdx(Math.max(0,idx-1));setFlipped(false)}} disabled={idx===0} label="←"/>
        <ActionBtn onClick={()=>setFlipped(!flipped)} label={flipped?"← Front":"Flip ↩"} primary/>
        <NavBtn onClick={()=>{setIdx(Math.min(daily.length-1,idx+1));setFlipped(false)}} disabled={idx===daily.length-1} label="→"/>
      </div>
      <div style={{ display:"flex", gap:6, justifyContent:"center", marginTop:10 }}>
        {daily.map((_,i)=><div key={i} onClick={()=>{setIdx(i);setFlipped(false)}} style={{ width:i===idx?"16px":"7px", height:"7px", borderRadius:"4px", cursor:"pointer", background:i===idx?T.gold:T.border, transition:"all 0.2s" }}/>)}
      </div>
    </div>
  );
}

// ─── READING VIEW ─────────────────────────────────────────────────────────────
function ReadingView() {
  const [done, setDone] = useState(() => {
    try { return JSON.parse(localStorage.getItem("kyc_b") || "[]"); } catch { return []; }
  });
  const toggle = t => {
    const n = done.includes(t) ? done.filter(x=>x!==t) : [...done,t];
    setDone(n);
    try { localStorage.setItem("kyc_b", JSON.stringify(n)); } catch {}
  };
  const total = BOOKS.reduce((a,p)=>a+p.books.length,0);
  return (
    <div style={{ maxWidth:"680px", margin:"0 auto" }}>
      <div style={{ textAlign:"center", marginBottom:18 }}>
        <div style={{ fontFamily:"'Raleway',sans-serif", fontSize:"14px", color:T.gold, marginBottom:3 }}>Self-Directed Seminary — 15 Books</div>
        <div style={{ fontSize:"11px", color:T.textSub }}>{done.length}/{total} read</div>
        <div style={{ width:180, height:4, background:T.border, borderRadius:2, margin:"8px auto 0" }}>
          <div style={{ height:"100%", width:`${done.length/total*100}%`, background:T.gold, borderRadius:2, transition:"width 0.4s" }}/>
        </div>
      </div>
      {BOOKS.map(phase=>(
        <div key={phase.phase} style={{ marginBottom:18 }}>
          <div style={{ fontFamily:"'Raleway',sans-serif", fontSize:"11px", color:phase.color, letterSpacing:"0.12em", borderBottom:`1px solid ${phase.color}33`, paddingBottom:5, marginBottom:10 }}>{phase.phase.toUpperCase()}</div>
          {phase.books.map(book=>(
            <div key={book.title} onClick={()=>toggle(book.title)} style={{
              display:"flex", gap:12, alignItems:"flex-start",
              background:done.includes(book.title)?`${phase.color}0d`:T.surface,
              border:`1px solid ${done.includes(book.title)?phase.color:T.border}`,
              borderRadius:8, padding:"11px 14px", marginBottom:8, cursor:"pointer", transition:"all 0.2s"
            }}>
              <div style={{ width:18, height:18, borderRadius:"50%", border:`2px solid ${phase.color}`, background:done.includes(book.title)?phase.color:"transparent", flexShrink:0, marginTop:2, display:"flex", alignItems:"center", justifyContent:"center" }}>
                {done.includes(book.title) && <span style={{ fontSize:10, color:"#fff" }}>✓</span>}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:2, gap:8 }}>
                  <div style={{ fontFamily:"'Raleway',sans-serif", fontSize:"13px", fontWeight:"700", color:T.text, lineHeight:1.2 }}>{book.title}</div>
                  <span style={{ fontSize:"9px", color:phase.color, background:`${phase.color}22`, padding:"2px 7px", borderRadius:3, flexShrink:0, fontFamily:"'Raleway',sans-serif" }}>{book.tag}</span>
                </div>
                <div style={{ fontSize:"11px", color:T.textSub, marginBottom:3, fontStyle:"italic" }}>— {book.author}</div>
                <div style={{ fontSize:"12px", color:T.textMuted, lineHeight:1.6, fontFamily:"'Inter',sans-serif" }}>{book.desc}</div>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function SH({ label, color }) {
  return <div style={{ fontSize:"9px", color, fontFamily:"'Raleway',sans-serif", letterSpacing:"0.12em", margin:"14px 0 8px", borderBottom:`1px solid ${color}22`, paddingBottom:4 }}>{label}</div>;
}
function FilterBtn({ label, active, color, onClick, count }) {
  return (
    <button onClick={onClick} style={{ background:active?`${color}18`:"transparent", border:`1px solid ${active?color:T.border}`, color:active?color:T.textMuted, padding:"5px 12px", borderRadius:"20px", cursor:"pointer", fontFamily:"'Raleway',sans-serif", fontSize:"11px", letterSpacing:"0.04em", transition:"all 0.2s", display:"flex", alignItems:"center", gap:5 }}>
      {label}<span style={{ fontSize:"9px", opacity:0.5 }}>({count})</span>
    </button>
  );
}
function ActionBtn({ onClick, label, primary }) {
  return (
    <button onClick={onClick} style={{
      background: primary ? T.gold : "#e8dcc8",
      border: `1px solid ${primary ? T.gold : "#b0a090"}`,
      color: primary ? "#fff" : "#3a2a18",
      padding:"8px 18px", borderRadius:"20px", cursor:"pointer",
      fontFamily:"'Raleway',sans-serif", fontSize:"11px",
      letterSpacing:"0.05em", fontWeight:"600",
      transition:"all 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,0.18)"
    }}>{label}</button>
  );
}
function NavBtn({ onClick, disabled, label }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled ? "#e0d8cc" : "#d4c8b0",
      border: `1px solid ${disabled ? "#c8bfb0" : "#a09070"}`,
      color: disabled ? "#b0a898" : "#3a2a18",
      width:38, height:38, borderRadius:"50%",
      cursor: disabled ? "default" : "pointer",
      fontSize:"17px", fontWeight:"bold",
      display:"flex", alignItems:"center", justifyContent:"center",
      transition:"all 0.2s", boxShadow: disabled ? "none" : "0 1px 4px rgba(0,0,0,0.18)"
    }}>{label}</button>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
