  james_a:      { c:["#1e5a3a","#c8a020","#1a3d7c","#6a2a10"], p:3 },
  jude:         { c:["#4a3a0a","#c8a020","#1a4a6a","#8b2010"], p:4 },

  // Church Fathers — deeper tones
  polycarp:     { c:["#1a2a5a","#c8a020","#8b2010","#1e4a38"], p:2 },
  irenaeus:     { c:["#1a3a5a","#c8a020","#5a2a10","#3a1a5a"], p:3 },
  athanasius:   { c:["#2a1a5a","#c8a020","#1a2a4a","#8b2010"], p:4 },
  augustine:    { c:["#1a0a3a","#c8a020","#6a2a10","#1a3a5a"], p:5 },
  chrysostom:   { c:["#4a2a10","#c8a020","#1a2a5a","#1e4a28"], p:0 },
  jerome:       { c:["#7a1a10","#c8a020","#1a2a5a","#3a2a3a"], p:1 },
  aquinas:      { c:["#101028","#c8a020","#1a1a3a","#1e3a28"], p:2 },

  // False Teachers — dark, warning palette (muted reds, murky purples)

  pelagius:     { c:["#2a1808","#8a1010","#1a0808","#3a2010"], p:1 },
  marcion:      { c:["#180808","#8a1010","#1a0a18","#281010"], p:2 },
  valentinus:   { c:["#200828","#8a1010","#100818","#2a0a20"], p:3 },
  montanus:     { c:["#280808","#8a1010","#200a08","#180808"], p:4 },
  sabellius:    { c:["#100810","#8a1010","#180818","#1a0a18"], p:5 },

function StainedGlass({ id, size = 72 }) {
  const cfg = SG_CFG[id] || { c:["#1a3d7c","#c8a020","#8b2010","#1e6b3a"], p:0 };
  const [c0,c1,c2,c3] = cfg.c;
  const pat = cfg.p % 6;
  const LEAD = "#0c0906";
  const LW = 2.2;
  const uid = (id||"x").replace(/[^a-z0-9]/g,"");
  const archId = `sg_${uid}`;
  // Gothic pointed arch — viewBox 0 0 80 96
  const arch = "M 5,92 L 5,53 C 5,17 40,4 40,4 C 40,4 75,17 75,53 L 75,92 Z";
  // Inner tracery arch (inset)
  const archInner = "M 9,90 L 9,55 C 9,22 40,10 40,10 C 40,10 71,22 71,55 L 71,90 Z";
  const W = size;
  const H = Math.round(size * 1.2);

  const panes = (() => { switch(pat) {
    case 0: return ( // Triple lancet + rose window
      <g>
        <rect width="80" height="96" fill={c3}/>
        {/* Left lancet */}
        <polygon points="10,90 10,57 13,49 17,34 21,49 24,57 24,90" fill={c0}/>
        {/* Center lancet — tallest */}
        <polygon points="28,90 28,50 32,33 40,10 48,33 52,50 52,90" fill={c1}/>
        {/* Right lancet */}
        <polygon points="56,90 56,57 59,49 63,34 67,49 70,57 70,90" fill={c2}/>
        {/* Rose circle */}
        <circle cx="40" cy="24" r="9" fill={c0} opacity="0.92"/>
        {/* Four petals around rose */}
        <circle cx="40" cy="13" r="5.5" fill={c2} opacity="0.85"/>
        <circle cx="31" cy="28" r="5.5" fill={c2} opacity="0.85"/>
        <circle cx="49" cy="28" r="5.5" fill={c2} opacity="0.85"/>
        {/* Horizontal register lines */}
        <line x1="10" y1="66" x2="24" y2="66" stroke={LEAD} strokeWidth={LW}/>
        <line x1="28" y1="66" x2="52" y2="66" stroke={LEAD} strokeWidth={LW}/>
        <line x1="56" y1="66" x2="70" y2="66" stroke={LEAD} strokeWidth={LW}/>
        {/* Vertical lead divisions */}
        <line x1="26" y1="90" x2="26" y2="52" stroke={LEAD} strokeWidth={LW}/>
        <line x1="54" y1="90" x2="54" y2="52" stroke={LEAD} strokeWidth={LW}/>
        {/* Rose lead */}
        <circle cx="40" cy="24" r="9" fill="none" stroke={LEAD} strokeWidth={LW-0.3}/>
        <circle cx="40" cy="13" r="5.5" fill="none" stroke={LEAD} strokeWidth={LW-0.5}/>
        <circle cx="31" cy="28" r="5.5" fill="none" stroke={LEAD} strokeWidth={LW-0.5}/>
        <circle cx="49" cy="28" r="5.5" fill="none" stroke={LEAD} strokeWidth={LW-0.5}/>
      </g>
    );
    case 1: return ( // Trefoil + two lancets + bar
      <g>
        <rect width="80" height="96" fill={c3}/>
        {/* Trefoil — three overlapping circles */}
        <circle cx="40" cy="19" r="12" fill={c1}/>
        <circle cx="29" cy="27" r="12" fill={c0}/>
        <circle cx="51" cy="27" r="12" fill={c2}/>
        {/* Center diamond below trefoil */}
        <polygon points="40,36 52,52 40,68 28,52" fill={c1}/>
        {/* Side lancets */}
        <polygon points="10,90 10,52 16,36 22,30 22,90" fill={c0}/>
        <polygon points="58,90 58,30 64,36 70,52 70,90" fill={c2}/>
        {/* Bottom bar */}
        <rect x="10" y="74" width="60" height="16" fill={c0}/>
        {/* Lead */}
        <circle cx="40" cy="19" r="12" fill="none" stroke={LEAD} strokeWidth={LW}/>
        <circle cx="29" cy="27" r="12" fill="none" stroke={LEAD} strokeWidth={LW}/>
        <circle cx="51" cy="27" r="12" fill="none" stroke={LEAD} strokeWidth={LW}/>
        <line x1="24" y1="36" x2="56" y2="36" stroke={LEAD} strokeWidth={LW}/>
        <line x1="24" y1="74" x2="56" y2="74" stroke={LEAD} strokeWidth={LW}/>
        <line x1="10" y1="74" x2="70" y2="74" stroke={LEAD} strokeWidth={LW}/>
        <polygon points="40,36 52,52 40,68 28,52" fill="none" stroke={LEAD} strokeWidth={LW-0.4}/>
      </g>
    );
    case 2: return ( // Diamond lattice
      <g>
        <rect width="80" height="96" fill={c3}/>
        {[
          [40,14,0],[20,30,1],[40,30,2],[60,30,1],
          [10,46,2],[30,46,0],[50,46,2],[70,46,0],
          [20,62,1],[40,62,0],[60,62,1],
          [10,78,2],[30,78,1],[50,78,2],[70,78,0],
          [40,84,1],
        ].map(([x,y,ci],i)=>{
          const S=11, S2=8;
          const cols=[c0,c1,c2];
          return <polygon key={i}
            points={`${x},${y-S} ${x+S2},${y} ${x},${y+S} ${x-S2},${y}`}
            fill={cols[ci]}/>
        })}
        {/* Lead lattice lines */}
        {[-2,14,30,46,62,78,94].map((y,i)=>(
          <line key={`h${i}`} x1="5" y1={y} x2="75" y2={y} stroke={LEAD} strokeWidth="1.4" opacity="0.65"/>
        ))}
        <line x1="10" y1="5" x2="10" y2="92" stroke={LEAD} strokeWidth="1.4" opacity="0.65"/>
        <line x1="30" y1="5" x2="30" y2="92" stroke={LEAD} strokeWidth="1.4" opacity="0.65"/>
        <line x1="50" y1="5" x2="50" y2="92" stroke={LEAD} strokeWidth="1.4" opacity="0.65"/>
        <line x1="70" y1="5" x2="70" y2="92" stroke={LEAD} strokeWidth="1.4" opacity="0.65"/>
      </g>
    );
    case 3: return ( // Cross + corner panes
      <g>
        <rect width="80" height="96" fill={c3}/>
        {/* Top oculus */}
        <circle cx="40" cy="19" r="10" fill={c2}/>
        {/* Vertical beam */}
        <rect x="31" y="12" width="18" height="76" fill={c0}/>
        {/* Horizontal beam */}
        <rect x="10" y="44" width="60" height="16" fill={c1}/>
        {/* Re-draw circle on top of beam overlap */}
        <circle cx="40" cy="19" r="10" fill={c2}/>
        {/* Corner fills */}
        <rect x="10" y="62" width="19" height="26" fill={c3}/>
        <rect x="51" y="62" width="19" height="26" fill={c3}/>
        {/* Corner panes top */}
        <polygon points="10,44 10,34 14,28 20,24 20,44" fill={c3}/>
        <polygon points="60,44 60,24 66,28 70,34 70,44" fill={c3}/>
        {/* Lead lines */}
        <rect x="31" y="12" width="18" height="76" fill="none" stroke={LEAD} strokeWidth={LW}/>
        <rect x="10" y="44" width="60" height="16" fill="none" stroke={LEAD} strokeWidth={LW}/>
        <circle cx="40" cy="19" r="10" fill="none" stroke={LEAD} strokeWidth={LW}/>
        <line x1="10" y1="62" x2="31" y2="62" stroke={LEAD} strokeWidth={LW}/>
        <line x1="49" y1="62" x2="70" y2="62" stroke={LEAD} strokeWidth={LW}/>
        <line x1="10" y1="76" x2="31" y2="76" stroke={LEAD} strokeWidth={LW}/>
        <line x1="49" y1="76" x2="70" y2="76" stroke={LEAD} strokeWidth={LW}/>
      </g>
    );
    case 4: return ( // Fan / radial from apex
      <g>
        <rect width="80" height="96" fill={c3}/>
        {/* Fan sections radiating from apex (40,4) */}
        <polygon points="40,4 10,90 25,90" fill={c0}/>
        <polygon points="40,4 25,90 40,90" fill={c1}/>
        <polygon points="40,4 40,90 55,90" fill={c2}/>
        <polygon points="40,4 55,90 70,90" fill={c0}/>
        {/* Left and right arch fills */}
        <polygon points="40,4 9,55 10,90" fill={c1}/>
        <polygon points="40,4 71,55 70,90" fill={c1}/>
        {/* Horizontal register bars */}
        <line x1="10" y1="44" x2="70" y2="44" stroke={LEAD} strokeWidth={LW}/>
        <line x1="9"  y1="68" x2="71" y2="68" stroke={LEAD} strokeWidth={LW}/>
        {/* Radial lead lines */}
        <line x1="40" y1="4" x2="10" y2="90" stroke={LEAD} strokeWidth={LW}/>
        <line x1="40" y1="4" x2="25" y2="90" stroke={LEAD} strokeWidth={LW}/>
        <line x1="40" y1="4" x2="40" y2="90" stroke={LEAD} strokeWidth={LW}/>
        <line x1="40" y1="4" x2="55" y2="90" stroke={LEAD} strokeWidth={LW}/>
        <line x1="40" y1="4" x2="70" y2="90" stroke={LEAD} strokeWidth={LW}/>
        {/* Central medallion */}
        <circle cx="40" cy="22" r="9" fill={c2} opacity="0.9"/>
        <circle cx="40" cy="22" r="9" fill="none" stroke={LEAD} strokeWidth={LW-0.4}/>
      </g>
    );
    default: return ( // Twin lancets + quatrefoil
      <g>
        <rect width="80" height="96" fill={c3}/>
        {/* Quatrefoil — four petals */}
        <circle cx="40" cy="16" r="9" fill={c0}/>
        <circle cx="31" cy="23" r="9" fill={c1}/>
        <circle cx="49" cy="23" r="9" fill={c2}/>
        <circle cx="40" cy="30" r="9" fill={c0}/>
        {/* Twin lancets */}
        <polygon points="10,90 10,50 15,34 20,26 20,90" fill={c1}/>
        <polygon points="60,90 60,26 65,34 70,50 70,90" fill={c2}/>
        {/* Center column */}
        <rect x="22" y="40" width="36" height="50" fill={c1}/>
        {/* Horizontal bar */}
        <line x1="10" y1="68" x2="70" y2="68" stroke={LEAD} strokeWidth={LW}/>
        <line x1="22" y1="40" x2="58" y2="40" stroke={LEAD} strokeWidth={LW}/>
        {/* Vertical lead */}
        <line x1="22" y1="40" x2="22" y2="90" stroke={LEAD} strokeWidth={LW}/>
        <line x1="58" y1="40" x2="58" y2="90" stroke={LEAD} strokeWidth={LW}/>
        {/* Quatrefoil lead */}
        <circle cx="40" cy="16" r="9" fill="none" stroke={LEAD} strokeWidth={LW-0.3}/>
        <circle cx="31" cy="23" r="9" fill="none" stroke={LEAD} strokeWidth={LW-0.3}/>
        <circle cx="49" cy="23" r="9" fill="none" stroke={LEAD} strokeWidth={LW-0.3}/>
        <circle cx="40" cy="30" r="9" fill="none" stroke={LEAD} strokeWidth={LW-0.3}/>
      </g>
    );
  }})();

  return (
    <svg width={W} height={H} viewBox="0 0 80 96" style={{ display:"block", flexShrink:0 }}>
      <defs>
        <clipPath id={archId}>
          <path d={arch}/>
        </clipPath>
      </defs>
      {/* Outer lead frame */}
      <path d={arch} fill={LEAD}/>
      {/* Glass content clipped to arch */}
      <g clipPath={`url(#${archId})`}>
        {panes}
      </g>
      {/* Outer border */}
      <path d={arch} fill="none" stroke={LEAD} strokeWidth="4"/>
      {/* Inner tracery border */}
      <path d={archInner} fill="none" stroke={LEAD} strokeWidth="1.2" opacity="0.5"/>
    </svg>
  );
}

    back:"His Gospel opens with the highest Christology in scripture. His three letters define authentic faith by three tests: love one another, obey his commands, confess Jesus came in the flesh. His discipleship chain — Polycarp → Irenaeus — is the line that defeated Gnosticism.",
    writings:[
      { title:"Gospel of John", desc:"Seven 'I AM' statements. Seven signs. The prologue on the eternal Word. 'That you may believe that Jesus is the Christ, the Son of God' (20:31). Most-read evangelism text in history." },
      { title:"1 John", desc:"Three tests of genuine faith: love, obedience, and confessing the Incarnation. Written against Cerinthus and proto-Gnosticism." },
      { title:"Revelation", desc:"Seven letters to seven churches (chs. 2–3 — most pastoral text in the NT). The fall of Babylon. New creation. 'Come, Lord Jesus.'" },
    ],
    connections:["Polycarp of Smyrna — personal disciple; the bridge between apostles and history","Ignatius of Antioch — likely knew John in Ephesus","Papias of Hierapolis — collected John's oral teachings"],
    modernEcho:"John → Polycarp → Irenaeus: the three-man chain that defeated Gnosticism. His Gospel remains the most-distributed evangelism text in all of church history." },

  { id:"thomas", category:"apostle", name:"Thomas", era:"d. ~72 AD", region:"India",
    tagline:"Doubted publicly, believed completely, went farthest of all.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"John 20:27–28", text:"'Put your finger here, and see my hands; and put out your hand, and place it in my side. Do not disbelieve, but believe. Thomas answered him, My Lord and my God!'" },
      { ref:"John 11:16", text:"'So Thomas, called the Twin, said to his fellow disciples, Let us also go, that we may die with him.' — Thomas is bold before he doubts." },
      { ref:"John 14:5", text:"'Thomas said to him, Lord, we do not know where you are going. How can we know the way?'" },
      { ref:"Acts 1:8", text:"'You will be my witnesses in Jerusalem and in all Judea and Samaria, and to the end of the earth.' — Thomas took this literally." },
    ],
    front:"Nicknamed 'the Twin' (Didymus). Refused to believe the resurrection without touching the wounds. Jesus appeared again just for him — and Thomas's response is the highest Christological confession in the Gospels: 'My Lord and my God!' Then he went farther than any other apostle.",
    back:"According to the ancient Mar Thoma Church of Kerala — confirmed by strong historical tradition — Thomas sailed to India around 52 AD. The Mar Thoma Christians of Kerala (6 million today) trace their founding directly to him. Martyred near Chennai. His doubt-to-confession arc is the pastoral pattern for every honest skeptic.",
    writings:[],
    connections:["Mar Thoma Church of Kerala — 6 million Christians trace to his mission","San Thome Cathedral, Chennai — built over his traditional tomb","Syrian Christians of India — independent tradition predating Western missionaries by 1,500 years"],
    modernEcho:"Thomas is the patron of India. Jesus met the doubter where he was, without contempt, and brought him to the highest confession. Every honest skeptic walks the same path." },

  { id:"andrew", category:"apostle", name:"Andrew", era:"d. ~60 AD", region:"Greece / Scythia",
    tagline:"First Called. First evangelist. He brought his brother Peter to Jesus.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"John 1:40–42", text:"'One of the two who heard John speak and followed Jesus was Andrew, Simon Peter's brother. He first found his own brother Simon and said to him, We have found the Messiah… He brought him to Jesus.'" },
      { ref:"John 6:8–9", text:"'One of his disciples, Andrew, Simon Peter's brother, said to him, There is a boy here who has five barley loaves and two fish, but what are they for so many?'" },
      { ref:"John 12:22", text:"'Philip went and told Andrew; Andrew and Philip went and told Jesus.' — Andrew is the bridge when Greeks seek Jesus." },
    ],
    front:"Simon Peter's brother. Fisherman on the Sea of Galilee. Called before Peter — Jesus found Andrew first (John 1:40–41). His first instinct was evangelism: he immediately ran to find his brother. That one act changed the entire trajectory of the church. He is called 'Protokletos' — the First-Called — in Eastern Orthodoxy.",
    back:"Tradition places his mission in Scythia (Ukraine/Russia), Greece, and Asia Minor. Crucified on an X-shaped cross (the Saltire) at Patras, Greece — asking to be crucified differently than his Lord, feeling unworthy. His cross became the flag of Scotland and the naval ensign of Russia.",
    writings:[],
    connections:["Peter — his brother, whom he brought to Jesus","Scotland — patron saint; his cross is the national flag","Russia — Eastern Orthodox tradition claims his founding mission there"],
    modernEcho:"His act of bringing Peter to Jesus is the model of every personal evangelism encounter. The Church of Scotland's flag is Andrew's cross. The Russian Orthodox Church traces its founding to him." },

  { id:"james_z", category:"apostle", name:"James (son of Zebedee)", era:"d. ~44 AD", region:"Jerusalem",
    tagline:"Son of Thunder. First apostle martyred. The sword fell on him first.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"Mark 3:17", text:"'James the son of Zebedee and John the brother of James (to whom he gave the name Boanerges, that is, Sons of Thunder).'" },
      { ref:"Mark 10:38–39", text:"'Are you able to drink the cup that I drink, or to be baptized with the baptism with which I am baptized? And they said to him, We are able.'" },
      { ref:"Acts 12:1–2", text:"'About that time Herod the king laid violent hands on some who belonged to the church. He killed James the brother of John with the sword.'" },
    ],
    front:"Son of Zebedee, brother of John. Inner circle (Peter, James, John) at the Transfiguration and Gethsemane. He and John asked Jesus for the best seats in the kingdom — Jesus asked about suffering. He answered yes. Acts 12:2 records his death in one sentence. First apostle killed. Herod's sword, ~44 AD.",
    back:"Tradition says he preached in Spain before returning to Jerusalem — hence Santiago de Compostela ('Saint James of the Field of Stars') in northwestern Spain. The Camino de Santiago pilgrimage traces to his tomb. 800 years of pilgrims, all tracing back to a fisherman who said 'We are able' to Jesus's cup — and drank it.",
    writings:[],
    connections:["John — his brother, fellow Son of Thunder","Peter — the inner three at Transfiguration and Gethsemane","Santiago de Compostela, Spain — one of three great medieval pilgrimage sites"],
    modernEcho:"The Camino de Santiago is walked by hundreds of thousands annually. His death in Acts 12:2 is one sentence. He had already answered Christ's question about the cup." },

  { id:"philip", category:"apostle", name:"Philip", era:"d. ~80 AD", region:"Phrygia / Asia Minor",
    tagline:"'Lord, show us the Father' — and Christ showed him everything.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"John 1:43–45", text:"'The next day Jesus decided to go to Galilee. He found Philip and said to him, Follow me… Philip found Nathanael and said to him, We have found him of whom Moses in the Law and also the prophets wrote, Jesus of Nazareth.'" },
      { ref:"John 6:5–7", text:"'Jesus said to Philip, Where are we to buy bread, so that these people may eat? He said this to test him… Philip answered him, Two hundred denarii worth of bread would not be enough.'" },
      { ref:"John 14:8–9", text:"'Philip said to him, Lord, show us the Father, and it is enough for us. Jesus said to him, Have I been with you so long, and you still do not know me, Philip? Whoever has seen me has seen the Father.'" },
    ],
    front:"From Bethsaida — same hometown as Peter and Andrew. Jesus found him directly — the only apostle explicitly called by Jesus personally without an intermediary. Practical and mathematical: when feeding 5,000, he immediately calculated the cost. His question — 'Lord, show us the Father' — drew out the most remarkable Christological statement Jesus ever made.",
    back:"Tradition places him in Phrygia (modern Turkey). His daughters were prophetesses cited by Papias of Hierapolis as authoritative witnesses to early church tradition. Martyred at Hierapolis. His one question unlocked Jesus's most explicit claim to divine identity: 'Whoever has seen me has seen the Father' (John 14:9).",
    writings:[],
    connections:["Nathanael/Bartholomew — Philip brought him to Jesus","Papias of Hierapolis — received traditions from Philip's daughters","The Greeks who sought Jesus (John 12) — came through Philip"],
    modernEcho:"'Show us the Father, and it is enough for us' is the cry of every seeker. Jesus's answer is the foundation of all Trinitarian theology and the most explicit self-identification in John's Gospel." },

  { id:"bartholomew", category:"apostle", name:"Bartholomew / Nathanael", era:"d. ~68 AD", region:"India / Armenia",
    tagline:"Seen under the fig tree before he was called — known before he knew.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"John 1:47–49", text:"'Jesus saw Nathanael coming toward him and said, Behold, an Israelite indeed, in whom there is no deceit! Nathanael said, How do you know me? Jesus answered, Before Philip called you, when you were under the fig tree, I saw you. Nathanael answered, Rabbi, you are the Son of God! You are the King of Israel!'" },
      { ref:"John 1:46", text:"'Nathanael said to him, Can anything good come out of Nazareth? Philip said to him, Come and see.'" },
      { ref:"Ps 139:1–2", text:"'O Lord, you have searched me and known me! You know when I sit down and when I rise up; you discern my thoughts from afar.' — What Jesus demonstrated under the fig tree." },
    ],
    front:"Almost certainly the same person as Nathanael — 'Bartholomew' is a patronymic (Bar-Tholmai = son of Tholmai). Jesus saw him sitting under a fig tree — private, unseen — and already knew him completely. His scepticism ('Can anything good come out of Nazareth?') dissolved the moment Jesus demonstrated omniscience.",
    back:"Tradition sends him to India (with Thomas) and then Armenia, where he is patron saint and co-founder of the Armenian Apostolic Church. Martyred by being flayed alive at Albanopolis, Armenia. Michelangelo's Last Judgment depicts Bartholomew holding his own skin — the face on the skin is believed to be Michelangelo's self-portrait.",
    writings:[],
    connections:["Philip — brought him to Jesus; their names always paired in apostle lists","Armenian Apostolic Church — claims him as co-founder with Thaddaeus","Michelangelo's Last Judgment (Sistine Chapel) — Bartholomew holds his flayed skin"],
    modernEcho:"The Armenian Apostolic Church (5 million) traces its founding to Bartholomew and Thaddaeus. Armenia was the first nation to adopt Christianity as state religion (301 AD)." },

  { id:"matthew", category:"apostle", name:"Matthew / Levi", era:"d. ~70 AD", region:"Judea / Ethiopia",
    tagline:"Tax collector turned Gospel writer — the most hated man Jesus called.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"Matt 9:9", text:"'As Jesus passed on from there, he saw a man called Matthew sitting at the tax booth, and he said to him, Follow me. And he rose and followed him.'" },
      { ref:"Matt 9:12–13", text:"'Those who are well have no need of a physician, but those who are sick… For I came not to call the righteous, but sinners.'" },
      { ref:"Matt 28:18–20", text:"'All authority in heaven and on earth has been given to me. Go therefore and make disciples of all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit… And behold, I am with you always, to the end of the age.'" },
      { ref:"Matt 5:3", text:"'Blessed are the poor in spirit, for theirs is the kingdom of heaven.' — The Sermon on the Mount opens." },
    ],
    front:"Tax collector — which in 1st-century Judea meant Roman collaborator and extortionist. The most socially despised category in Jewish society. Jesus walked past his toll booth at Capernaum and said two words: 'Follow me.' Matthew left everything and threw a party — inviting all his disreputable friends to meet Jesus. The Pharisees were scandalized. Jesus was comfortable.",
    back:"His Gospel is the most Jewish of the four — structured around five great discourses mirroring the five books of Moses, saturated with OT fulfillment quotations. Written to demonstrate that Jesus is the Messiah. The Sermon on the Mount (chs. 5–7) is the most influential single teaching in human history.",
    writings:[
      { title:"Gospel of Matthew", desc:"Most Jewish Gospel. Five great discourses (Sermon on the Mount, Mission Discourse, Parables, Church Discipline, Olivet Discourse). 61 OT quotations. Presents Jesus as new Moses and fulfillment of all the Law and Prophets." },
    ],
    connections:["Caravaggio — 'The Calling of Saint Matthew' (1600, Rome) one of the most celebrated paintings in the world","Mark and Luke — the Synoptic relationship","The Great Commission (Matt 28:18–20) — his most enduring legacy"],
    modernEcho:"The Sermon on the Mount has been cited by Gandhi, Tolstoy, and Martin Luther King Jr. The tax collector who became an Apostle is the permanent testimony that Jesus specializes in transforming the most disqualified people." },

  { id:"james_a", category:"apostle", name:"James the Less", era:"d. ~62 AD", region:"Jerusalem",
    tagline:"Brother of the Lord. Pillar of Jerusalem. Camel-knees from constant prayer.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"Gal 1:19", text:"'But I saw none of the other apostles except James the Lord's brother.'" },
      { ref:"Gal 2:9", text:"'And when James and Cephas and John, who seemed to be pillars, perceived the grace that was given to me, they gave the right hand of fellowship.'" },
      { ref:"Jas 1:2–3", text:"'Count it all joy, my brothers, when you meet trials of various kinds, for you know that the testing of your faith produces steadfastness.'" },
      { ref:"Jas 2:17", text:"'So also faith by itself, if it does not have works, is dead.'" },
      { ref:"Jas 1:27", text:"'Religion that is pure and undefiled before God the Father is this: to visit orphans and widows in their affliction, and to keep oneself unstained from the world.'" },
    ],
    front:"Called 'the Less' to distinguish him from James son of Zebedee. Almost certainly the same as 'James the Lord's brother' (Gal 1:19) — leader of the Jerusalem church, one of three 'pillars' Paul names, chairman of the Jerusalem Council (Acts 15). Known as 'James the Just.' Said to have knees like a camel from constant prayer.",
    back:"Josephus (Jewish historian, not a Christian) records his death: the high priest Ananus had him thrown from the Temple pinnacle and stoned when he would not recant Christ. ~62 AD. Josephus's independent record confirms the NT account. His letter is the most practical book in the NT, saturated with Sermon on the Mount language.",
    writings:[
      { title:"Letter of James", desc:"Practical theology for trial, speech, wealth, prayer, and the fruit of genuine faith. 'Faith without works is dead' (2:17). Saturated with Sermon on the Mount language — James likely heard it directly." },
    ],
    connections:["Paul — met personally in Jerusalem (Gal 1:19); Jerusalem Council (Acts 15)","Josephus — records his death independently, giving external historical confirmation","James 1:27 — 'visit orphans and widows' — basis of Christian social action"],
    modernEcho:"Luther called James 'an epistle of straw' because it seemed to contradict Paul. He was wrong. James addresses the evidence of genuine faith; Paul addresses its ground. Same truth, different angle." },

  { id:"jude", category:"apostle", name:"Jude / Thaddaeus", era:"d. ~65 AD", region:"Persia / Armenia",
    tagline:"'How is it that you will manifest yourself to us and not to the world?'",
    badge:"APOSTLE",
    scriptures:[
      { ref:"John 14:22–23", text:"'Judas (not Iscariot) said to him, Lord, how is it that you will manifest yourself to us, and not to the world? Jesus answered him, If anyone loves me, he will keep my word, and my Father will love him, and we will come to him and make our home with him.'" },
      { ref:"Jude 3", text:"'Beloved, although I was very eager to write to you about our common salvation, I found it necessary to write appealing to you to contend for the faith that was once for all delivered to the saints.'" },
      { ref:"Jude 24–25", text:"'Now to him who is able to keep you from stumbling and to present you blameless before the presence of his glory with great joy, to the only God, our Savior, through Jesus Christ our Lord, be glory, majesty, dominion, and authority, before all time and now and forever. Amen.'" },
    ],
    front:"Listed as 'Thaddaeus' in Matthew and Mark, 'Judas son of James' in Luke. His only recorded words (John 14:22) are a genuine theological question about Christ's self-revelation. Jesus's answer describes the indwelling of the Trinity in the believer. One question. One answer that changed everything.",
    back:"Patron saint of hopeless causes — a tradition based on his being overlooked (people avoided asking 'Jude' for prayers because of the name Judas). His brief letter is a concentrated tour de force of OT typology. The doxology closing it (vv. 24–25) is one of the most majestic in the NT. Tradition places his mission with Simon in Persia.",
    writings:[
      { title:"Letter of Jude", desc:"25 verses. Dense with OT typology. Warning against false teachers who 'pervert the grace of God into sensuality and deny our only Master and Lord, Jesus Christ' (v.4). Closes with the most majestic doxology in the NT." },
    ],
    connections:["Simon the Zealot — traditional mission partner in Persia","Jude 3 — 'the faith once for all delivered' is the canonical statement that the apostolic deposit is closed","St. Jude's Children's Research Hospital (Danny Thomas) — named after the patron of hopeless causes"],
    modernEcho:"'Contend for the faith once for all delivered to the saints' (Jude 3) is the scriptural warrant for every defender of orthodoxy in every generation. One sentence from the most overlooked apostle." },

  { id:"simon", category:"apostle", name:"Simon the Zealot", era:"d. ~65 AD", region:"Persia / Egypt",
    tagline:"The revolutionary who found the only revolution that lasts.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"Luke 6:15", text:"'…and Matthew, and Thomas, and James the son of Alphaeus, and Simon who was called the Zealot.'" },
      { ref:"John 18:36", text:"'Jesus answered, My kingdom is not of this world. If my kingdom were of this world, my servants would have been fighting.' — The rebuke of every Zealot theology." },
      { ref:"Matt 5:9", text:"'Blessed are the peacemakers, for they shall be called sons of God.' — The beatitude that cut across everything Simon's Zealot politics stood for." },
      { ref:"Rom 12:21", text:"'Do not be overcome by evil, but overcome evil with good.'" },
    ],
    front:"His surname almost certainly identifies him with the Zealot movement — the Jewish revolutionary faction that believed violent resistance against Rome was a religious obligation. The apostolic band included at the same table Matthew (a Roman collaborator) and Simon (a Roman-resisting revolutionary). Jesus made them brothers. This is the most extraordinary political fact in the NT.",
    back:"We know almost nothing else about him from the NT — named in all four apostle lists and then silent. The revolutionary became a servant. Tradition sends him with Jude to Persia where both were martyred. His very obscurity is a kind of sanctity — he sought nothing for himself.",
    writings:[],
    connections:["Matthew — their pairing at the same apostolic table is the NT's sharpest political commentary","Jude/Thaddaeus — traditional mission partner","Zealot movement — led the Jewish revolt of 66–70 AD; Simon chose a different path"],
    modernEcho:"Every generation produces Christians who confuse the Kingdom of God with a political program. Simon the Zealot is the permanent answer: the man who thought revolutionary politics would fix the world met the risen Christ and found the only transformation that reaches the root." },

  { id:"matthias", category:"apostle", name:"Matthias", era:"d. ~80 AD", region:"Judea / Ethiopia",
    tagline:"Chosen by lot to replace the betrayer — faithfulness over fame.",
    badge:"APOSTLE",
    scriptures:[
      { ref:"Acts 1:21–22", text:"'So one of the men who have accompanied us during all the time that the Lord Jesus went in and out among us, beginning from the baptism of John until the day when he was taken up from us — one of these men must become with us a witness to his resurrection.'" },
      { ref:"Acts 1:24–26", text:"'And they prayed and said, You, Lord, who know the hearts of all, show which one of these two you have chosen… And the lot fell on Matthias, and he was numbered with the eleven apostles.'" },
      { ref:"1 Cor 4:2", text:"'Moreover, it is required of stewards that they be found faithful.'" },
    ],
    front:"The replacement apostle. Chosen not by popular acclaim but by prayer and lot — a method trusting God's sovereignty over the outcome. He had followed Jesus from the very beginning without ever being in the Twelve. Faithful, present, watching — then suddenly called to the center. The lot fell on him. He accepted.",
    back:"He is proof that faithfulness in obscurity is not wasted. He followed Jesus for three years as an unnamed disciple, watched from outside the Twelve, and when the moment came, he was ready. Tradition places his mission in Judea and Ethiopia. Less is known of him than almost any other apostle — and that itself is a lesson about what God values.",
    writings:[],
    connections:["Joseph Barsabbas — the other candidate, not chosen; both equally qualified","Ethiopian Orthodox Church — claims him as the apostle to Ethiopia","Eusebius — records him as preaching in Judea and martyred there"],
    modernEcho:"Matthias is the patron saint of every faithful person doing the right thing in obscurity, waiting. The lot falls where God wills. Readiness is built in the quiet years before the call." },

  // ══════════════════ CHURCH FATHERS ══════════════════
  { id:"polycarp", category:"father", name:"Polycarp", era:"69–155 AD", region:"Smyrna",
    tagline:"The bridge between the apostles and history — burned at 86 years old.",
    badge:"APOSTOLIC FATHER",
    scriptures:[
      { ref:"Rev 2:10", text:"'Be faithful unto death, and I will give you the crown of life.' — Christ's word to Smyrna, Polycarp's own church." },
      { ref:"John 15:13", text:"'Greater love has no one than this, that someone lay down his life for his friends.'" },
      { ref:"2 Tim 1:12", text:"'But I am not ashamed, for I know whom I have believed, and I am convinced that he is able to guard until that day what has been entrusted to me.'" },
      { ref:"1 John 4:2–3", text:"'Every spirit that confesses that Jesus Christ has come in the flesh is from God.' — John's test. Polycarp learned it directly from John." },
    ],
    front:"Personal disciple of the Apostle John. Bishop of Smyrna for decades. When Gnostic teacher Marcion met him in Rome and asked 'Do you know me?', Polycarp replied: 'I know you — you are the firstborn of Satan.' Arrested at 86 years old. The proconsul urged him to renounce Christ. He replied: 'Eighty-six years I have served him, and he never did me any wrong. How can I blaspheme my king who saved me?'",
    back:"Burned at the stake in the stadium at Smyrna. The soldiers nailed him to the post — he told them not to bother, he wouldn't move. His 'Martyrdom of Polycarp' is the earliest detailed account of Christian martyrdom outside the NT. He is the direct chain between John and Irenaeus — which means his faithfulness preserved orthodoxy for every generation after.",
    writings:[
      { title:"Letter to the Philippians", desc:"Heavy use of NT — shows the NT was already authoritative by 110 AD. Warns extensively against false teaching. His Christology is unambiguously Johannine." },
      { title:"Martyrdom of Polycarp", desc:"Written by the Smyrna church shortly after 155 AD. The earliest detailed Christian martyrdom account. His final prayer before the flames is one of the most beautiful texts in church history." },
    ],
    connections:["Apostle John — personal disciple; the living eyewitness chain","Irenaeus of Lyon — his most famous student; the man who defeated Gnosticism","Ignatius of Antioch — wrote Polycarp a personal letter on his way to martyrdom"],
    modernEcho:"John → Polycarp → Irenaeus is the chain that saved the church from Gnosticism. Polycarp is the hinge. His reply to the proconsul — 'Eighty-six years I have served him' — is the model of every faithful death." },

  { id:"irenaeus", category:"father", name:"Irenaeus", era:"130–202 AD", region:"Lyon, Gaul",
    tagline:"Polycarp's student — the man who defeated Gnosticism with scripture.",
    badge:"CHURCH FATHER",
    scriptures:[
      { ref:"1 Tim 6:20", text:"'O Timothy, guard the deposit entrusted to you. Avoid the irreverent babble and contradictions of what is falsely called knowledge (gnosis).' — The verse Irenaeus built Against Heresies on." },
      { ref:"John 1:14", text:"'The Word became flesh and dwelt among us.' — The Incarnation Gnostics denied." },
      { ref:"Gal 1:8", text:"'But even if we or an angel from heaven should preach to you a gospel contrary to the one we preached to you, let him be accursed.'" },
      { ref:"Luke 1:2", text:"'…just as those who from the beginning were eyewitnesses and ministers of the word have delivered them to us.' — Apostolic tradition Irenaeus defended as the test of truth." },
    ],
    front:"Born in Asia Minor, heard Polycarp preach as a boy, moved to Lyon in Gaul (France) and became its bishop. When Gnosticism threatened the churches of Gaul, he wrote the most comprehensive refutation of ancient heresy ever produced — his method was pure scripture and apostolic tradition.",
    back:"His Recapitulation theology: Christ re-did and redeemed every stage of human life to restore what Adam lost. Where Adam disobeyed, Christ obeyed. Where Eve believed a lie, Mary believed the truth. The whole of history converges in Christ. Still the most compelling narrative framework for the Incarnation.",
    writings:[
      { title:"Against Heresies (5 vols., c.180 AD)", desc:"Book I: Description of Gnostic systems — terrifyingly familiar today. Books II–V: Systematic refutation using scripture and apostolic tradition. The foundational anti-heresy text in church history." },
      { title:"Proof of the Apostolic Preaching", desc:"Shows how the OT prefigures Christ on every page. Typology worked out in detail. Short and accessible." },
    ],
    connections:["Polycarp — his teacher who knew John the Apostle","Justin Martyr — earlier apologist whose tradition he built on","Augustine, Athanasius — built on his foundation of Incarnation theology"],
    modernEcho:"Every time the church faces a 'new spirituality' combining Jesus with esoteric knowledge or cosmic consciousness — that is Gnosticism. Irenaeus gave us the permanent toolkit: scripture, apostolic tradition, and the bodily Incarnation." },

  { id:"athanasius", category:"father", name:"Athanasius", era:"296–373 AD", region:"Alexandria",
    tagline:"Contra mundum — exiled 5 times, never surrendered an inch.",
    badge:"CONFESSOR",
    scriptures:[
      { ref:"John 1:1", text:"'In the beginning was the Word, and the Word was with God, and the Word was God.' — The text Athanasius defended his entire life." },
      { ref:"Col 1:15–17", text:"'He is the image of the invisible God, the firstborn of all creation. For by him all things were created… and in him all things hold together.'" },
      { ref:"Heb 1:3", text:"'He is the radiance of the glory of God and the exact imprint of his nature.'" },
      { ref:"2 Pet 1:4", text:"'…that through these you may become partakers of the divine nature.' — The basis for his theology: he became man so we could share divine life." },
    ],
    front:"Coptic Egyptian — dark-skinned; his enemies mocked his appearance. Attended Nicaea at 29 as a deacon. Became bishop of Alexandria at 33. Exiled five times by four emperors who backed Arianism. 'Athanasius contra mundum' — against the world. Never compromised. Returned from every exile.",
    back:"His core argument in On the Incarnation: only a fully divine Savior can fully save. A demi-god redeemer is still a creature — no creature can bear infinite guilt or give eternal life. Also wrote the first list of all 27 NT books (367 AD Festal Letter) — the exact canon we have today.",
    writings:[
      { title:"On the Incarnation", desc:"Written at ~20 years old. C.S. Lewis wrote the introduction: 'It is a masterpiece.' The most accessible patristic theology ever written. Start here." },
      { title:"Against the Arians (4 vols.)", desc:"Technical demolition of Arianism. Establishes ὁμοούσιος (homoousios) — the Son is of the same substance as the Father." },
      { title:"39th Festal Letter (367 AD)", desc:"First document in history listing all 27 NT books as canonical — exactly our canon today. Written from exile." },
    ],
    connections:["Alexander of Alexandria — mentor","Macarius the Great — desert father friend","Cappadocian Fathers — next generation who completed his work"],
    modernEcho:"Every time you recite 'True God from True God, begotten not made, of one substance with the Father' (Nicene Creed), you are repeating what Athanasius was exiled five times for defending." },

  { id:"augustine", category:"father", name:"Augustine", era:"354–430 AD", region:"N. Africa",
    tagline:"Our heart is restless until it rests in Thee.",
    badge:"CHURCH FATHER",
    scriptures:[
      { ref:"Rom 9:16", text:"'So then it depends not on human will or exertion, but on God, who has mercy.' — The text Augustine built his doctrine of grace on." },
      { ref:"John 6:44", text:"'No one can come to me unless the Father who sent me draws him.' — Irresistible grace." },
      { ref:"Eph 2:1", text:"'And you were dead in the trespasses and sins.' — Original sin's corruption of the will." },
      { ref:"Rom 7:18", text:"'For I know that nothing good dwells in me, that is, in my flesh. For I have the desire to do what is right, but not the ability to carry it out.'" },
      { ref:"1 Cor 1:29–31", text:"'…so that no human being might boast in the presence of God… Let the one who boasts, boast in the Lord.'" },
    ],
    front:"Born in North Africa. Brilliant and dissolute — Manichaean for 9 years, took a mistress, had a son. His mother Monica prayed for him for 30 years. Heard Ambrose of Milan preach. Converted in a Milan garden in 386 AD, age 32: 'Take and read.' Romans 13:13–14. Broken and made new.",
    back:"The most influential theologian in Western Christianity. Luther was an Augustinian friar reading his anti-Pelagian writings when he recovered justification by faith. His Confessions is the first autobiography in Western literature and the greatest spiritual memoir ever written.",
    writings:[
      { title:"Confessions (397 AD)", desc:"Autobiographical prayer to God. 'You have made us for yourself, and our heart is restless until it rests in you.' The greatest spiritual autobiography ever written." },
      { title:"City of God (426 AD)", desc:"Written after Rome's sack (410 AD). Two cities: City of God (love of God) vs. City of Man (love of self). Christianity and political power." },
      { title:"On Free Will / On Grace and Free Will", desc:"The Pelagian controversy. Grace must precede and enable the will. We are dead — we need resurrection, not coaching." },
    ],
    connections:["Monica — his mother; 30 years of prayer","Ambrose of Milan — whose preaching converted him","Martin Luther (1,100 yrs later) — Augustinian friar who found the Reformation in Augustine's anti-Pelagian writings"],
    modernEcho:"Reformed theology is essentially recovered Augustinianism. Every debate about grace vs. free will is Augustine vs. Pelagius re-enacted. Keller, Piper, Sproul — all deeply Augustinian." },

  { id:"chrysostom", category:"father", name:"Chrysostom", era:"347–407 AD", region:"Constantinople",
    tagline:"Golden Mouth — the greatest preacher in church history.",
    badge:"CONFESSOR",
    scriptures:[
      { ref:"2 Tim 4:2", text:"'Preach the word; be ready in season and out of season; reprove, rebuke, and exhort, with complete patience and teaching.' — The verse that defines his ministry." },
      { ref:"Heb 4:12", text:"'For the word of God is living and active, sharper than any two-edged sword.'" },
      { ref:"Matt 25:40", text:"'Truly, I say to you, as you did it to one of the least of these my brothers, you did it to me.' — The basis of his radical social preaching." },
    ],
    front:"'Chrysostom' (Golden Mouth) was given by the people — not his birth name. Archbishop of Constantinople at the center of imperial power. Preached verse-by-verse through entire books of the Bible. Rebuked Empress Eudoxia publicly for seizing a widow's vineyard. Exiled twice. Died on a forced march saying 'Glory to God for all things.'",
    back:"240+ sermons on Matthew. 88 on John. Full series on Romans, Corinthians, Galatians. Augustine learned Greek to read him. His Divine Liturgy is still prayed in every Orthodox church every Sunday — 1,600 years of unbroken use. His line: 'The road to hell is paved with the skulls of erring priests.'",
    writings:[
      { title:"Homilies on Matthew (90)", desc:"Verse-by-verse expository preaching. The model of patristic biblical exposition." },
      { title:"On the Priesthood (6 vols.)", desc:"Classic text on pastoral ministry. Still assigned in seminary. Required reading for anyone who preaches." },
      { title:"Divine Liturgy of St. John Chrysostom", desc:"Used every Sunday in Eastern Orthodox worship for 1,600 years. The most-prayed liturgy in Christian history." },
    ],
    connections:["Eastern Orthodox tradition — their primary patristic preaching model","MacArthur, Lloyd-Jones, Spurgeon — all work in the expository tradition he established"],
    modernEcho:"Every expository preacher stands in his tradition. His liturgy is still prayed by 260 million Orthodox Christians every Sunday." },

  { id:"jerome", category:"father", name:"Jerome", era:"347–420 AD", region:"Bethlehem",
    tagline:"Ignorance of Scripture is ignorance of Christ.",
    badge:"CHURCH FATHER",
    scriptures:[
      { ref:"2 Tim 3:16–17", text:"'All Scripture is breathed out by God and profitable for teaching, for reproof, for correction, and for training in righteousness.'" },
      { ref:"John 5:39", text:"'You search the Scriptures because you think that in them you have eternal life; and it is they that bear witness about me.'" },
      { ref:"Ps 119:103", text:"'How sweet are your words to my taste, sweeter than honey to my mouth!'" },
      { ref:"Matt 4:4", text:"'Man shall not live by bread alone, but by every word that comes from the mouth of God.' — Jerome devoted his life to making sure everyone could access this word." },
    ],
    front:"Extraordinarily learned, famously cantankerous. Mastered Hebrew, Greek, and Latin. Studied under Jewish scholars in Bethlehem to learn the OT in its original language. Had a dream in which he appeared before God's judgment and was told: 'You are a Ciceronian, not a Christian' — driving him from classical literature to scripture.",
    back:"His Vulgate (Latin Bible, 405 AD) was the Bible of Western Christianity for 1,000 years. Every medieval theologian read scripture in Jerome's translation. His famous line — 'Ignorance of Scripture is ignorance of Christ' — is the foundation of every serious Bible study program.",
    writings:[
      { title:"The Vulgate (c.382–405 AD)", desc:"Latin translation of the entire Bible from Hebrew and Greek originals. The Bible of Western Christianity for over 1,000 years." },
      { title:"Commentaries (Isaiah, Matthew, Galatians, Ezekiel…)", desc:"Extensive verse-by-verse commentaries modelling close reading of the original languages." },
      { title:"Letters (154 surviving)", desc:"Pastoral letters and scorching polemics. Among the most vivid personal correspondence in the ancient world." },
    ],
    connections:["Augustine — famous 15-year correspondence debating Galatians","Pope Damasus — commissioned the Vulgate","Paula and Marcella — wealthy Roman women who funded his work and ran female monastic communities"],
    modernEcho:"The Reformation was possible partly because Erasmus produced a Greek NT that let Luther compare it with Jerome's Vulgate and find discrepancies — including the word 'repent.' Jerome's translation shaped a thousand years of Western theology." },

  { id:"aquinas", category:"father", name:"Aquinas", era:"1225–1274 AD", region:"Italy",
    tagline:"Grace does not destroy nature — it perfects it.",
    badge:"SCHOLASTIC DOCTOR",
    scriptures:[
      { ref:"Rom 1:20", text:"'For his invisible attributes, namely, his eternal power and divine nature, have been clearly perceived, ever since the creation of the world, in the things that have been made.' — The foundation of his natural theology." },
      { ref:"John 1:9", text:"'The true light, which gives light to everyone, was coming into the world.' — Natural reason participates in divine reason." },
      { ref:"1 Cor 13:12", text:"'For now we see in a mirror dimly, but then face to face. Now I know in part; then I shall know fully.' — Reason perfected by grace and glory." },
    ],
    front:"Dominican friar so quiet and large his classmates called him 'the dumb ox.' His teacher Albert the Great predicted: 'This dumb ox will one day fill the world with his lowing.' Refused the Archbishopric of Naples to keep writing. Died at 49 saying: 'I have seen things that make all my writings seem like straw.'",
    back:"His Summa Theologiae (unfinished) is the greatest systematic theology of the medieval period and the official doctrinal framework of Roman Catholicism. His Five Ways (proofs for God's existence) are still the starting point for philosophy of religion. Protestants often disagree with his conclusions but cannot ignore his method.",
    writings:[
      { title:"Summa Theologiae (1265–1274)", desc:"Covers God, creation, man, virtue, the Incarnation, sacraments. Structured as objection → answer → reply. Never finished — abandoned three months before his death." },
      { title:"Summa Contra Gentiles (1259–1265)", desc:"Defense of Christian faith against Islam, Judaism, and paganism using reason alone. Pioneer of rational apologetics." },
    ],
    connections:["Albert the Great — his teacher","Aristotle — the philosopher he synthesized with Christian theology","Pope Leo XIII — made Thomism the official philosophy of the Catholic Church (1879)"],
    modernEcho:"Every Catholic seminary still reads the Summa. His natural law theory underlies Catholic social teaching. Keller, N.T. Wright, and Alvin Plantinga all engage Thomistic arguments." },
